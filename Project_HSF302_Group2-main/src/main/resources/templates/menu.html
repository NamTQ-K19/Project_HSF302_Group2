<!-- src/main/resources/templates/menu.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - BrewMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/customer/customer.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .hero-banner {
            background: linear-gradient(135deg, var(--brown-primary) 0%, var(--brown-dark) 100%);
            border-radius: var(--radius-xl);
            padding: 60px 50px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        .hero-banner::after {
            content: '';
            position: absolute;
            right: -50px;
            top: -50px;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .hero-banner::before {
            content: '';
            position: absolute;
            left: 30%;
            bottom: -80px;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
        .hero-banner .content {
            position: relative;
            z-index: 1;
        }
        .hero-banner h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
        }
        .hero-banner h1 i {
            margin-right: 12px;
        }
        .hero-banner p {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            margin-bottom: 0;
        }
        .hero-banner .stats {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }
        .hero-banner .stats .stat-item {
            color: rgba(255,255,255,0.9);
        }
        .hero-banner .stats .stat-item .number {
            font-size: 24px;
            font-weight: 700;
        }
        .hero-banner .stats .stat-item .label {
            font-size: 13px;
            opacity: 0.7;
        }
        .hero-banner .order-now {
            position: relative;
            z-index: 1;
        }
        .hero-banner .order-now .btn-white {
            background: var(--white);
            color: var(--brown-primary);
            padding: 12px 32px;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .hero-banner .order-now .btn-white:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }

        .category-wrapper {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 32px;
            scrollbar-width: thin;
            scrollbar-color: var(--brown-beige) transparent;
        }
        .category-wrapper::-webkit-scrollbar {
            height: 4px;
        }
        .category-wrapper::-webkit-scrollbar-thumb {
            background: var(--brown-primary);
            border-radius: 4px;
        }
        .category-wrapper::-webkit-scrollbar-track {
            background: var(--brown-beige);
            border-radius: 4px;
        }

        .filter-btn {
            padding: 10px 28px;
            border-radius: var(--radius-md);
            border: 2px solid var(--brown-beige);
            background: var(--white);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .filter-btn:hover {
            border-color: var(--brown-primary);
            color: var(--brown-primary);
        }
        .filter-btn.active {
            background: var(--brown-primary);
            border-color: var(--brown-primary);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(107, 68, 35, 0.25);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        @media (max-width: 1200px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 992px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
            .hero-banner { padding: 40px 30px; }
            .hero-banner h1 { font-size: 28px; }
            .hero-banner .stats { gap: 20px; }
        }
        @media (max-width: 576px) {
            .product-grid { grid-template-columns: 1fr; }
            .hero-banner { padding: 30px 20px; border-radius: var(--radius-lg); }
            .hero-banner h1 { font-size: 22px; }
            .hero-banner .stats { flex-wrap: wrap; gap: 12px; }
            .hero-banner .order-now { margin-top: 16px; }
        }
    </style>
</head>
<body>
<header class="header">
    <a href="/" class="header-logo">
        <div class="header-logo-icon"><i class="fas fa-mug-hot"></i></div>
        <span class="header-logo-text">Brew<span>Master</span></span>
    </a>
    <nav class="header-nav">
        <a href="/menu" class="active"><i class="fas fa-utensils"></i><span>Menu</span></a>
        <a href="/customer/cart" class="header-cart">
            <i class="fas fa-shopping-cart"></i><span>Giỏ hàng</span>
            <span class="header-cart-badge" id="cartBadge"><span id="cartCount">0</span></span>
        </a>
        <a href="/customer/orders/history"><i class="fas fa-history"></i><span>Lịch sử</span></a>
        <div class="header-avatar"><i class="fas fa-user"></i></div>
    </nav>
</header>

<main class="main">
    <div class="hero-banner">
        <div class="row align-items-center">
            <div class="col-lg-7 content">
                <h1><i class="fas fa-mug-hot"></i>Menu của chúng tôi</h1>
                <p>Khám phá những thức uống và bánh ngọt thơm ngon, được pha chế từ những nguyên liệu tốt nhất</p>
                <div class="stats">
                    <div class="stat-item">
                        <div class="number" th:text="${products != null ? products.size() : 0}">0</div>
                        <div class="label">Sản phẩm</div>
                    </div>
                    <div class="stat-item">
                        <div class="number">100%</div>
                        <div class="label">Nguyên liệu tự nhiên</div>
                    </div>
                    <div class="stat-item">
                        <div class="number">⭐ 4.8</div>
                        <div class="label">Đánh giá</div>
                    </div>
                </div>
            </div>
            <div class="col-lg-5 text-lg-end order-now">
                <a href="/customer/cart" class="btn-white">
                    <i class="fas fa-shopping-cart"></i> Xem giỏ hàng
                    <span class="badge bg-danger text-white rounded-pill ms-2" id="heroCartCount" style="font-size: 12px;">0</span>
                </a>
            </div>
        </div>
    </div>

    <div class="category-wrapper">
        <button class="filter-btn active" data-category="all">🏠 Tất cả</button>
        <button class="filter-btn" data-category="1">☕ Cà phê</button>
        <button class="filter-btn" data-category="2">🍵 Trà</button>
        <button class="filter-btn" data-category="3">🧊 Đá xay</button>
        <button class="filter-btn" data-category="4">🍰 Bánh</button>
        <button class="filter-btn" data-category="5">🧃 Nước ép</button>
        <button class="filter-btn" data-category="6">🥛 Sữa chua</button>
    </div>

    <div class="product-grid" id="productGrid">
        <div th:each="product : ${products}" class="product-card product-item"
             th:data-category="${product.category != null ? product.category.categoryId : 0}">
            <div class="product-image-wrap">
                <img th:src="${product.images != null and !product.images.isEmpty() ? product.images[0].imageUrl : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22 viewBox=%220 0 300 300%22%3E%3Crect width=%22300%22 height=%22300%22 fill=%22%23f8f9fa%22/%3E%3Ctext x=%2250%25%22 y=%2255%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2280%22 fill=%22%23dee2e6%22%3E☕%3C/text%3E%3C/svg%3E'}"
                     th:alt="${product.name}" loading="lazy"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22 viewBox=%220 0 300 300%22%3E%3Crect width=%22300%22 height=%22300%22 fill=%22%23f8f9fa%22/%3E%3Ctext x=%2250%25%22 y=%2255%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2280%22 fill=%22%23dee2e6%22%3E☕%3C/text%3E%3C/svg%3E';">
            </div>
            <div class="product-info">
                <h5 class="product-name" th:text="${product.name}">Product Name</h5>
                <p class="product-desc" th:text="${product.description}">Description</p>
                <div class="product-controls">
                    <select class="form-select" th:id="'variant-' + ${product.productId}">
                        <option th:each="variant : ${product.variants}"
                                th:value="${variant.variantId}"
                                th:text="${variant.variantName + ' - ' + #numbers.formatDecimal(variant.price, 0, 'COMMA', 0, 'POINT') + '₫'}">
                        </option>
                    </select>
                    <input type="text" class="form-Note" th:id="'note-' + ${product.productId}" placeholder="Ghi chú (ít đường, không đá...)" />
                    <div class="product-actions">
                        <input type="number" th:id="'qty-' + ${product.productId}" value="1" min="1" max="10">
                        <button class="btn-primary add-to-cart" th:data-product-id="${product.productId}">
                            <i class="fas fa-cart-plus"></i> Thêm
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- TOAST BOTTOM RIGHT -->
<div class="toast-container-bottom" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.5/dist/sweetalert2.all.min.js"></script>
<script>
    $(document).ready(function() {
        updateCartBadge();

        $('.add-to-cart').click(function() {
            const productId = $(this).data('product-id');
            const variantId = $('#variant-' + productId).val();
            const quantity = $('#qty-' + productId).val();
            const specialNote = $('#note-' + productId).val();

            if (!variantId) {
                Swal.fire({ icon: 'warning', title: 'Chưa chọn loại sản phẩm', text: 'Vui lòng chọn loại sản phẩm trước khi thêm vào giỏ' });
                return;
            }

            const btn = $(this);
            btn.prop('disabled', true);
            btn.html('<i class="fas fa-spinner fa-spin"></i>');

            $.ajax({
                url: '/customer/cart/add',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    productId: parseInt(productId),
                    variantId: parseInt(variantId),
                    quantity: parseInt(quantity) || 1,
                    specialNote: specialNote || null
                }),
                success: function(response) {
                    if (response.success) {
                        showToast('Đã thêm sản phẩm vào giỏ hàng!', 'success');
                        updateCartBadge();
                    } else {
                        showToast('❌ ' + (response.message || 'Không thể thêm sản phẩm'), 'error');
                    }
                    btn.prop('disabled', false);
                    btn.html('<i class="fas fa-cart-plus"></i> Thêm');
                    $('#note-' + productId).val('');
                },
                error: function(xhr) {
                    let errorMsg = 'Không thể thêm sản phẩm';
                    try { const response = JSON.parse(xhr.responseText); if (response.message) errorMsg = response.message; } catch(e) {}
                    showToast(errorMsg, 'error');
                    btn.prop('disabled', false);
                    btn.html('<i class="fas fa-cart-plus"></i> Thêm');
                }
            });
        });

        $('.filter-btn').click(function() {
            $('.filter-btn').removeClass('active');
            $(this).addClass('active');
            const category = $(this).data('category');
            if (category === 'all') { $('.product-item').show(); } else {
                $('.product-item').each(function() {
                    $(this).data('category') == category ? $(this).show() : $(this).hide();
                });
            }
        });

        function updateCartBadge() {
            $.ajax({
                url: '/customer/cart/count',
                type: 'GET',
                success: function(count) {
                    $('#cartCount').text(count || 0);
                    $('#heroCartCount').text(count || 0);
                    count > 0 ? $('#cartBadge').css('display', 'flex') : $('#cartBadge').hide();
                }
            });
        }

        function showToast(message, type) {
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', warning: 'fa-exclamation-triangle', info: 'fa-info-circle' };
            const toast = $(`
            <div class="toast-item-bottom ${type}">
                <i class="fas ${icons[type] || 'fa-info-circle'} icon"></i>
                <span class="msg">${message}</span>
                <button class="close" onclick="this.parentElement.remove()">&times;</button>
            </div>
        `);
            $('#toastContainer').append(toast);
            setTimeout(() => toast.fadeOut(300, () => toast.remove()), 3000);
        }
    });
</script>
</body>
</html>
