<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Xác nhận mật khẩu – BrewMaster</title>
    
    <!-- Tailwind CSS config -->
    <div th:replace="~{catalog/tailwind-head :: tailwind-head}"></div>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body class="bg-surface-container-lowest text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed antialiased min-h-screen flex flex-col">

<div th:replace="~{catalog/navbar :: navbar}"></div>

<main class="flex-1 flex items-center justify-center py-12 px-margin-desktop">
    <div class="w-full max-w-md bg-white border border-outline-variant rounded-3xl p-8 sm:p-12 shadow-sm text-center">

        <div class="w-16 h-16 rounded-full bg-secondary-container text-secondary flex items-center justify-center mx-auto mb-6">
            <span class="material-symbols-outlined text-[32px]">lock</span>
        </div>
        
        <h1 class="font-headline-sm text-primary mb-3">Xác nhận mật khẩu</h1>
        <div class="text-on-surface-variant text-body-md mb-8">
            Bạn đang thay đổi email thành<br/>
            <strong th:text="${newEmail}" class="text-on-surface"></strong><br/>
            Vui lòng nhập mật khẩu hiện tại để tiếp tục.
        </div>

        <!-- Error handled by global toast -->

        <form th:action="@{/customer/profile/verify-password}" th:object="${passwordForm}" method="post" class="text-left">
            <input type="hidden" name="newEmail" th:value="${newEmail}"/>
            <input type="hidden" name="username" th:value="${username}"/>
            <input type="hidden" name="firstName" th:value="${profileData.firstName}"/>
            <input type="hidden" name="lastName" th:value="${profileData.lastName}"/>
            <input type="hidden" name="phone" th:value="${profileData.phone}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-6">
                <label class="block text-body-sm font-bold text-on-surface mb-2">
                    Mật khẩu hiện tại <span class="text-error">*</span>
                </label>
                <input type="password" th:field="*{currentPassword}" placeholder="Nhập mật khẩu hiện tại của bạn" autofocus
                       class="w-full bg-surface-container-lowest border border-outline rounded-xl p-4 text-body-md focus:border-primary outline-none transition-colors"
                       th:classappend="${#fields.hasErrors('currentPassword')} ? 'border-error'"/>
                <div th:if="${#fields.hasErrors('currentPassword')}" class="text-error text-body-sm mt-1" th:errors="*{currentPassword}"></div>
            </div>

            <button type="submit" class="w-full bg-primary text-white px-6 py-4 rounded-full font-bold text-body-lg hover:opacity-90 transition-opacity border-none cursor-pointer flex items-center justify-center gap-2 shadow-sm shadow-primary/20">
                <span class="material-symbols-outlined text-[20px]">check_circle</span> Xác nhận & gửi OTP
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-outline-variant border-dashed">
            <a th:href="@{/customer/profile}" class="inline-flex items-center gap-1.5 text-on-surface-variant hover:text-primary font-medium text-body-sm transition-colors no-underline">
                <span class="material-symbols-outlined text-[16px]">arrow_back</span> Quay lại Hồ sơ
            </a>
        </div>

    </div>
</main>

<div th:replace="~{catalog/footer :: footer}"></div>

</body>
</html>
