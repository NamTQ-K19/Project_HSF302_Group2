<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--
    Fragment: product-card
    Accepts a single `product` (ProductCardDTO) via th:object.
    Reused by Homepage and Search Results — OCP in templates.
-->
<div th:fragment="productCard(product)" class="group flex flex-col h-full">
    <a th:href="@{/products/{id}(id=${product.productId})}" class="no-underline relative aspect-[4/5] rounded-3xl overflow-hidden mb-5 bg-surface-container-low border border-outline-variant block">
        <img th:src="@{${product.primaryImageUrl}}" th:alt="${product.name}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<span class=\'material-symbols-outlined text-on-surface-variant/20 text-[64px] absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2\'>local_cafe</span>';"/>
        
        <div class="absolute inset-x-4 bottom-4 translate-y-2 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
            <div class="w-full py-3 bg-white/90 backdrop-blur-sm text-primary font-bold text-body-sm rounded-xl minimal-shadow flex items-center justify-center gap-2 border border-outline-variant hover:bg-primary hover:text-white transition-colors cursor-pointer">
                <span class="material-symbols-outlined text-lg">add_shopping_cart</span> Thêm vào giỏ
            </div>
        </div>
    </a>
    
    <div class="px-2 flex flex-col flex-1">
        <div class="flex justify-between items-start mb-2 gap-2">
            <h4 class="font-headline-sm text-headline-sm text-primary m-0 line-clamp-2" th:text="${product.name}">Tên sản phẩm</h4>
            <div class="text-primary font-extrabold text-body-md m-0 shrink-0">
                <span th:if="${product.minPrice == product.maxPrice}" 
                      th:text="${#numbers.formatDecimal(product.minPrice,0,'COMMA',0,'POINT')} + 'đ'">Giá</span>
                <span th:unless="${product.minPrice == product.maxPrice}" 
                      th:text="${#numbers.formatDecimal(product.minPrice,0,'COMMA',0,'POINT')} + ' – ' + ${#numbers.formatDecimal(product.maxPrice,0,'COMMA',0,'POINT')} + 'đ'">Giá</span>
            </div>
        </div>
        
        <p class="text-on-surface-variant/60 text-body-sm mb-3 m-0" th:text="${product.categoryName}">Danh mục</p>
        
        <div class="flex items-center gap-1 mt-auto" th:if="${product.reviewCount > 0}">
            <div class="flex">
                <span th:each="i : ${#numbers.sequence(1,5)}" 
                      th:classappend="${i <= product.averageRating} ? 'text-primary' : 'text-outline-variant'" 
                      class="material-symbols-outlined text-[14px]" 
                      th:style="${i <= product.averageRating} ? 'font-variation-settings: \'FILL\' 1;' : ''">star</span>
            </div>
            <span class="text-on-surface-variant/50 text-[12px] font-semibold ml-1" th:text="${product.reviewCount} + ' đánh giá'">Đánh giá</span>
        </div>
        <div class="mt-auto" th:unless="${product.reviewCount > 0}">
            <span class="text-on-surface-variant/40 text-[12px] font-medium">Chưa có đánh giá</span>
        </div>
    </div>
</div>

</html>
