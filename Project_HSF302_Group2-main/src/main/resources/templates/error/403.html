<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>403 – Không có quyền truy cập</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #fdf6ee;
            color: #2c1a0e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(59,31,14,.12);
            border: 1px solid #ddc5a8;
            padding: 56px 48px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: fadeIn .35s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            font-size: 72px;
            margin-bottom: 20px;
            display: block;
            line-height: 1;
        }

        .error-code {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #a0522d;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 26px;
            font-weight: 700;
            color: #3b1f0e;
            margin-bottom: 14px;
            line-height: 1.3;
        }

        .error-desc {
            font-size: 15px;
            color: #6b4c35;
            line-height: 1.7;
            margin-bottom: 36px;
        }

        .divider {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, #a0522d, #c8874a);
            border-radius: 2px;
            margin: 0 auto 32px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #6f3d1f;
            color: #ffffff;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: background .2s, transform .1s, box-shadow .2s;
            box-shadow: 0 2px 8px rgba(111,61,31,.25);
        }
        .btn-home:hover {
            background: #3b1f0e;
            box-shadow: 0 4px 14px rgba(59,31,14,.30);
        }
        .btn-home:active { transform: scale(.97); }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #f5e6d3;
            color: #3b1f0e;
            border: 1.5px solid #ddc5a8;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: background .2s;
            margin-right: 10px;
        }
        .btn-back:hover { background: #ddc5a8; }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .brand {
            margin-bottom: 32px;
        }
        .brand-text {
            font-size: 20px;
            font-weight: 700;
            color: #3b1f0e;
        }
        .brand-text span { color: #a0522d; }
    </style>
</head>
<body>
<div class="error-card">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-text">☕ Cafe<span>Shop</span></div>
    </div>

    <!-- Icon -->
    <span class="error-icon">🔒</span>

    <!-- Code label -->
    <div class="error-code">Lỗi 403 &nbsp;·&nbsp; Truy cập bị từ chối</div>

    <!-- Title -->
    <h1 class="error-title">Bạn không có quyền truy cập trang này</h1>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Description -->
    <p class="error-desc">
        Tài khoản của bạn không được phép xem nội dung này.<br/>
        Vui lòng quay về trang chủ hoặc liên hệ quản trị viên nếu bạn cho rằng đây là nhầm lẫn.
    </p>

    <!-- Actions -->
    <div class="btn-group">
        <a href="javascript:history.back()" class="btn-back">
            ← Quay lại
        </a>
        <a th:href="${homeUrl}" class="btn-home">
            🏠 Về trang chủ
        </a>
    </div>

</div>
</body>
</html>
