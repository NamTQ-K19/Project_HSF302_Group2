<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Đổi Mật Khẩu - Bean & Brew</title>
    <link rel="stylesheet" th:href="@{/css/mark_password.css}">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        body {
            background-color: #fcfbf9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .profile-card {
            width: 100%;
            max-width: 700px;
            background-color: #ffffff;
            border: 1px solid #e5d8c5;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .profile-header {
            background-color: #f7eedf;
            padding: 16px 24px;
            border-bottom: 1px solid #e5d8c5;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-header i {
            color: #4a3320;
            width: 20px;
            height: 20px;
        }

        .profile-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #4a3320;
            font-weight: 600;
        }

        .profile-body {
            padding: 30px;
        }

        .form-row {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            color: #5c4d40;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-label span {
            color: #d9534f;
        }

        .input-group {
            position: relative;
        }

        .form-control {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: #333;
            background-color: #ffffff;
            border: 1px solid #d4c4b0;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: #8b6b4a;
            box-shadow: 0 0 0 3px rgba(139, 107, 74, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #4a3320;
        }

        .toggle-password i {
            width: 18px;
            height: 18px;
        }

        .alert-error {
            background-color: #fdeded;
            color: #d9534f;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #5c3d26;
            color: #ffffff;
        }

        .btn-primary:hover {
            background-color: #4a311e;
        }

        .btn-secondary {
            background-color: #eae1d0;
            color: #5c3d26;
        }

        .btn-secondary:hover {
            background-color: #ddcfae;
        }

        .btn i {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="profile-header">
        <i data-feather="lock"></i>
        <h2>Thay đổi mật khẩu</h2>
    </div>

    <div class="profile-body">
        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert-error">
            <i data-feather="alert-circle" style="width: 16px; height: 16px;"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/profile/changePassword}" method="post">
            <input type="hidden" th:value="${user.userId}" name="userId">

            <div class="form-row">
                <label for="currentPassword" class="form-label">Mật khẩu hiện tại <span>*</span></label>
                <div class="input-group">
                    <input type="password" id="currentPassword" name="currentPassword" class="form-control" required placeholder="Nhập mật khẩu hiện tại của bạn">
                    <button type="button" class="toggle-password" onclick="togglePassword('currentPassword', 'eye-icon-1')">
                        <i id="eye-icon-1" data-feather="eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-row">
                <label for="newPassword" class="form-label">Mật khẩu mới <span>*</span></label>
                <div class="input-group">
                    <input type="password" id="newPassword" name="newPassword" class="form-control" required placeholder="Nhập mật khẩu mới">
                    <button type="button" class="toggle-password" onclick="togglePassword('newPassword', 'eye-icon-2')">
                        <i id="eye-icon-2" data-feather="eye"></i>
                    </button>
                </div>
                <!-- Password Strength Meter -->
                <div id="password-strength-box" style="display:none; margin-top: 10px; margin-bottom: 15px;">
                    <div style="display:flex; gap:4px; margin-bottom:8px;">
                        <div id="bar-1" class="pw-bar"></div>
                        <div id="bar-2" class="pw-bar"></div>
                        <div id="bar-3" class="pw-bar"></div>
                        <div id="bar-4" class="pw-bar"></div>
                        <div id="bar-5" class="pw-bar"></div>
                    </div>
                    <div id="strength-label" style="font-size:0.75rem; font-weight:600; margin-bottom:8px; color:#888;"></div>
                    <ul style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px;">
                        <li id="check-length"  class="pw-check"><span class="pw-dot">●</span> Ít nhất 8 ký tự</li>
                        <li id="check-upper"   class="pw-check"><span class="pw-dot">●</span> Có chữ hoa (A-Z)</li>
                        <li id="check-lower"   class="pw-check"><span class="pw-dot">●</span> Có chữ thường (a-z)</li>
                        <li id="check-number"  class="pw-check"><span class="pw-dot">●</span> Có chữ số (0-9)</li>
                        <li id="check-special" class="pw-check"><span class="pw-dot">●</span> Có ký tự đặc biệt (@$!%*?&amp;...)</li>
                    </ul>
                </div>
            </div>

            <div class="form-row">
                <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới <span>*</span></label>
                <div class="input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required placeholder="Nhập lại mật khẩu mới">
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'eye-icon-3')">
                        <i id="eye-icon-3" data-feather="eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitChangePassword">
                    <i data-feather="save"></i>
                    Lưu thay đổi
                </button>
                <!-- Nút Hủy: redirect về trang phù hợp theo role -->
                <a th:if="${#authorization.expression('hasRole(''CUSTOMER'')')}"
                   href="/customer/profile" class="btn btn-secondary">Hủy</a>
                <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
                   href="/admin/profile" class="btn btn-secondary">Hủy</a>
                <a th:if="${#authorization.expression('hasRole(''MANAGER'')')}"
                   href="/manager/reservations" class="btn btn-secondary">Hủy</a>
                <a th:if="${#authorization.expression('hasRole(''CASHIER'')')}"
                   href="/order/create" class="btn btn-secondary">Hủy</a>
                <a th:if="${#authorization.expression('hasRole(''BARISTA'')')}"
                   href="/order/edit" class="btn btn-secondary">Hủy</a>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/mark_password.js}"></script>
<script>
    feather.replace();

    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.setAttribute('data-feather', 'eye-off');
        } else {
            input.type = "password";
            icon.setAttribute('data-feather', 'eye');
        }
        feather.replace();
    }
</script>
</body>
</html>
