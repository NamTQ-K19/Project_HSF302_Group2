<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bean & Brew</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <script src="https://unpkg.com/feather-icons"></script>
</head>


<body>


<div class="auth-layout">
  <!-- Left Pane - Branding & Graphic -->
  <div class="auth-left-pane">
      <a class="auth-brand" th:href="@{/}">
          BrewMaster
      </a>
    <div class="auth-illustration-container">
      <div class="auth-illustration-wrapper">
        <img 
          src="https://images.unsplash.com/photo-1605187151664-9d89904d62d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxhZXN0aGV0aWMlMjBjb2ZmZWUlMjBsYXR0ZSUyMGFydHxlbnwxfHx8fDE3ODIxODU3NjF8MA&ixlib=rb-4.1.0&q=80&w=1080" 
          alt="Aesthetic coffee latte art"
          class="auth-illustration-image"
        />
      </div>
      <h2 class="auth-tagline">
        Sip, Smile, Repeat.
      </h2>
    </div>
    <div class="auth-blob-tr"></div>
    <div class="auth-blob-bl"></div>
  </div>

  <!-- Right Pane - Form -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header">
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email to reset your password.</p>
      </div>

      <!-- Messages -->
      <div th:if="${errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${errorMessage}"></span>
      </div>

      <form method="post" action="/forgot-password" class="auth-form">
        <!-- CSRF Token -->
        <p class="hidden">
            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
        </p>

        <!-- Email Input -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="mail" class="auth-icon"></i>
          </div>
          <input type="email" name="email" id="emailInput" class="auth-input"
                 placeholder="example@email.com" required
                 th:value="${email}">
        </div>

        <button type="submit" class="auth-btn-primary mt-4">
            Send Request
        </button>
      </form>

      <!-- Back to Login -->
      <div class="auth-footer-text">
          <a href="/customer/login" class="auth-link">
              <i data-feather="arrow-left" class="auth-icon-small"></i>
              Back to Login
          </a>
      </div>

    </div>
  </div>
</div>


<script>
  feather.replace();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
