<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bean & Brew</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <link rel="stylesheet" th:href="@{/css/mark_password.css}">
    <script src="https://unpkg.com/feather-icons"></script>
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>


<body>


<div class="auth-layout">
  <!-- Left Pane - Branding & Graphic -->
  <div class="auth-left-pane">
      <a class="auth-brand" th:href="@{/}">
          BrewMaster
      </a>
    <div class="auth-illustration-container">
      <div class="auth-illustration-wrapper">
        <img 
          src="https://images.unsplash.com/photo-1605187151664-9d89904d62d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxhZXN0aGV0aWMlMjBjb2ZmZWUlMjBsYXR0ZSUyMGFydHxlbnwxfHx8fDE3ODIxODU3NjF8MA&ixlib=rb-4.1.0&q=80&w=1080" 
          alt="Aesthetic coffee latte art"
          class="auth-illustration-image"
        />
      </div>
      <h2 class="auth-tagline">
        Sip, Smile, Repeat.
      </h2>
    </div>
    <div class="auth-blob-tr"></div>
    <div class="auth-blob-bl"></div>
  </div>

  <!-- Right Pane - Form -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header">
        <h1 class="auth-title">Set New Password</h1>
        <p class="auth-subtitle">Please enter the OTP and your new password.</p>
      </div>

      <!-- Messages -->
      <div th:if="${param.successMessage}" class="auth-alert-success">
          <i data-feather="check-circle" class="auth-icon-small"></i>
          <span th:text="${param.successMessage}"></span>
      </div>
      <div th:if="${param.errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${param.errorMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${errorMessage}"></span>
      </div>

      <form th:action="@{/set-password}" method="post" class="auth-form">
        <!-- CSRF Token -->
        <p class="hidden">
            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
        </p>

        <!-- Hidden Email -->
        <input type="hidden" name="email" th:value="${email}"/>

        <!-- OTP -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="key" class="auth-icon"></i>
          </div>
          <input type="text" name="otp" id="otp" class="auth-input" placeholder="OTP (123456)" required th:value="${otp}">
        </div>

        <!-- New Password -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="lock" class="auth-icon"></i>
          </div>
          <input type="password" name="newPassword" id="newPassword" class="auth-input-password" placeholder="New password" required>
          <button type="button" onclick="togglePassword('newPassword', 'eye-icon-1')" class="auth-input-icon-right">
            <i id="eye-icon-1" data-feather="eye" class="auth-icon"></i>
          </button>
        </div>

        <!-- Password Strength Meter -->
        <div id="password-strength-box" style="display:none; margin-top: 10px; margin-bottom: 15px;">
            <div style="display:flex; gap:4px; margin-bottom:8px;">
                <div id="bar-1" class="pw-bar"></div>
                <div id="bar-2" class="pw-bar"></div>
                <div id="bar-3" class="pw-bar"></div>
                <div id="bar-4" class="pw-bar"></div>
                <div id="bar-5" class="pw-bar"></div>
            </div>
            <div id="strength-label" style="font-size:0.75rem; font-weight:600; margin-bottom:8px; color:#888;"></div>
            <ul style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px;">
                <li id="check-length"  class="pw-check"><span class="pw-dot">●</span> Ít nhất 8 ký tự</li>
                <li id="check-upper"   class="pw-check"><span class="pw-dot">●</span> Có chữ hoa (A-Z)</li>
                <li id="check-lower"   class="pw-check"><span class="pw-dot">●</span> Có chữ thường (a-z)</li>
                <li id="check-number"  class="pw-check"><span class="pw-dot">●</span> Có chữ số (0-9)</li>
                <li id="check-special" class="pw-check"><span class="pw-dot">●</span> Có ký tự đặc biệt (@$!%*?&amp;...)</li>
            </ul>
        </div>

        <!-- Confirm New Password -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="lock" class="auth-icon"></i>
          </div>
          <input type="password" name="confirmPassword" id="confirmPassword" class="auth-input-password" placeholder="Confirm new password" required>
          <button type="button" onclick="togglePassword('confirmPassword', 'eye-icon-2')" class="auth-input-icon-right">
            <i id="eye-icon-2" data-feather="eye" class="auth-icon"></i>
          </button>
        </div>

        <!-- Submit Buttons -->
        <div class="flex gap-3 mt-4 pt-2">
            <button type="submit" class="auth-btn-primary">
                Submit
            </button>
            <button type="reset" class="auth-btn-secondary">
                Clear
            </button>
        </div>
        
        <div class="auth-footer-text">
            <span >Didn't receive the OTP?</span>
            <a th:href="@{/resend-otp(email=${email})}" class="text-sm font-semibold text-stone-900 hover:text-stone-600 transition-colors ml-1">
                Resend OTP
            </a>
        </div>
      </form>

      <!-- Back to Login -->
      <div class="auth-footer-text">
          <a href="/customer/login" class="auth-link">
              <i data-feather="arrow-left" class="auth-icon-small"></i>
              Back to Login
          </a>
      </div>

    </div>
  </div>
</div>

<script th:src="@{/js/mark_password.js}"></script>
<script>
  feather.replace();
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === "password") {
      input.type = "text";
      icon.setAttribute('data-feather', 'eye-off');
    } else {
      input.type = "password";
      icon.setAttribute('data-feather', 'eye');
    }
    feather.replace();
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
