<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewMaster - Staff Login</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <script src="https://unpkg.com/feather-icons"></script>
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body>

<div class="auth-layout">
  <!-- Glassmorphic Card -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header">
        <h1 class="auth-title">Staff Portal</h1>
        <p class="auth-subtitle">Access your management account</p>
      </div>

      <!-- Messages -->
      <div th:if="${error}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${error}"></span>
      </div>

      <!-- Login Type Toggle -->
      <div class="auth-toggle-group">
        <a href="/customer/login" class="auth-toggle-inactive">
          <i data-feather="user" class="auth-icon-small"></i> Customer
        </a>
        <a href="/staff/login" class="auth-toggle-active">
          <i data-feather="coffee" class="auth-icon-small"></i> Staff
        </a>
      </div>

      <form th:action="@{/staff/login}" method="post" class="auth-form">
        <!-- Username Field -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="user" class="auth-icon"></i>
          </div>
          <input
            id="username" name="username" type="text" required
            class="auth-input"
            placeholder="Username"
          />
        </div>

        <!-- Password Field -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="lock" class="auth-icon"></i>
          </div>
          <input
            id="password" name="password" type="password" required
            class="auth-input-password"
            placeholder="Password"
          />
          <button type="button" onclick="togglePassword('password', 'eye-icon')" class="auth-input-icon-right">
            <i id="eye-icon" data-feather="eye" class="auth-icon"></i>
          </button>
        </div>

        <!-- Remember Me -->
        <div class="auth-remember-row">
          <label class="auth-checkbox-label">
            <div class="auth-checkbox-wrapper">
              <input type="checkbox" id="rememberMe" name="remember-me" />
            </div>
            <span>Remember me</span>
          </label>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="auth-btn-primary mt-4">
          Login
        </button>
      </form>

    </div>
  </div>
</div>

<script>
  feather.replace();
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === "password") {
      input.type = "text";
      icon.setAttribute('data-feather', 'eye-off');
    } else {
      input.type = "password";
      icon.setAttribute('data-feather', 'eye');
    }
    feather.replace();
  }
</script>
</body>
</html>
