<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewMaster - Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <script src="https://unpkg.com/feather-icons"></script>
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body>

<div class="auth-layout">
  <!-- Glassmorphic Card -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header">
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">Enter your email to reset your password.</p>
      </div>

      <!-- Messages -->
      <div th:if="${errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${errorMessage}"></span>
      </div>

      <form method="post" action="/forgot-password" class="auth-form">
        <!-- CSRF Token -->
        <p class="hidden">
            <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
        </p>

        <!-- Email Input -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="mail" class="auth-icon"></i>
          </div>
          <input type="email" name="email" id="emailInput" class="auth-input"
                 placeholder="example@email.com" required
                 th:value="${email}">
        </div>

        <button type="submit" class="auth-btn-primary mt-4">
            Send Request
        </button>
      </form>

      <!-- Back to Login -->
      <div class="auth-footer-text" style="margin-top: 1.5rem;">
          <a href="/customer/login" class="auth-link" style="display: inline-flex; align-items: center; gap: 0.5rem; justify-content: center;">
              <i data-feather="arrow-left" style="width: 1rem; height: 1rem;"></i>
              Back to Login
          </a>
      </div>

    </div>
  </div>
</div>

<script>
  feather.replace();
</script>
</body>
</html>
