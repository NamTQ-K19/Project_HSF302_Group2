<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bean & Brew</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body>


<div class="auth-layout">
  <!-- Left Pane - Branding & Graphic -->
  <div class="auth-left-pane">
    <div class="auth-brand">
      Bean & Brew
    </div>
    <div class="auth-illustration-container">
      <div class="auth-illustration-wrapper">
        <img 
          src="https://images.unsplash.com/photo-1605187151664-9d89904d62d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxhZXN0aGV0aWMlMjBjb2ZmZWUlMjBsYXR0ZSUyMGFydHxlbnwxfHx8fDE3ODIxODU3NjF8MA&ixlib=rb-4.1.0&q=80&w=1080" 
          alt="Aesthetic coffee latte art"
          class="auth-illustration-image"
        />
      </div>
      <h2 class="auth-tagline">
        Sip, Smile, Repeat.
      </h2>
    </div>
    <div class="auth-blob-tr"></div>
    <div class="auth-blob-bl"></div>
  </div>

  <!-- Right Pane - Form -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header">
        <h1 class="auth-title">Sign In</h1>
        <p class="auth-subtitle">Welcome back! Please enter your details</p>
      </div>

      <!-- Messages -->
      <div th:if="${param.successMessage}" class="auth-alert-success">
          <i data-feather="check-circle" class="auth-icon-small"></i>
          <span th:text="${param.successMessage}"></span>
      </div>
      <div th:if="${param.errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${param.errorMessage}"></span>
      </div>
      <div th:if="${error}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${error}"></span>
      </div>

      <!-- Login Type Toggle -->
      <div class="auth-toggle-group">
        <a href="/customer/login" class="auth-toggle-active">
          <i data-feather="user" class="auth-icon-small"></i> Customer
        </a>
        <a href="/staff/login" class="auth-toggle-inactive">
          <i data-feather="coffee" class="auth-icon-small"></i> Staff
        </a>
      </div>

      <form th:action="@{/login}" method="post" class="auth-form">
        <!-- Username Field -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="user" class="auth-icon"></i>
          </div>
          <input
            id="username" name="username" type="text" required
            class="auth-input"
            placeholder="Username"
          />
        </div>

        <!-- Password Field -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="lock" class="auth-icon"></i>
          </div>
          <input
            id="password" name="password" type="password" required
            class="auth-input-password"
            placeholder="Password"
          />
          <button type="button" onclick="togglePassword('password', 'eye-icon')" class="auth-input-icon-right">
            <i id="eye-icon" data-feather="eye" class="auth-icon"></i>
          </button>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="auth-remember-row">
          <label class="auth-checkbox-label">
              <div class="auth-checkbox-wrapper">
              <input type="checkbox" id="rememberMe" name="remember-me" class="peer w-4 h-4 opacity-0 absolute" />
              <div class="auth-checkbox-input">
                <svg class="hidden" viewBox="0 0 14 14" fill="none">
                  <path d="M3 7L6 10L11 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <span >Remember me</span>
          </label>
          <a href="/forgot-password" class="auth-link">
            Forgot password?
          </a>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="auth-btn-primary mt-4">
          Sign In
        </button>
        
        
        <!-- Google Button -->
        <div class="auth-divider">
            <div class="auth-divider-line"><div class="auth-divider-line-inner"></div></div>
            <div class="auth-divider-text-container"><span class="auth-divider-text">OR</span></div>
        </div>
        
        <a href="/oauth2/authorization/google" class="auth-btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google icon">
          Sign In with Google
        </a>
      </form>

      <!-- Footer Sign Up -->
      <p class="mt-8 text-center text-sm font-medium text-stone-600">
        Don't have an account? 
        <a href="/register" class="font-semibold text-stone-900 hover:text-stone-600 transition-colors">
          Create one
        </a>
      </p>

    </div>
  </div>
</div>


<script>
  feather.replace();
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === "password") {
      input.type = "text";
      icon.setAttribute('data-feather', 'eye-off');
    } else {
      input.type = "password";
      icon.setAttribute('data-feather', 'eye');
    }
    feather.replace();
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
