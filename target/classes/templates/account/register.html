<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewMaster - Register</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <link rel="stylesheet" th:href="@{/css/mark_password.css}">
    <script src="https://unpkg.com/feather-icons"></script>
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <style>
        .auth-right-pane { max-width: 540px; padding: 2.5rem; }
        .auth-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
        @media (max-width: 640px) { .auth-grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>

<body>

<div class="auth-layout">
  <!-- Glassmorphic Card -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header" style="margin-bottom: 2rem;">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join the BrewMaster family</p>
      </div>

      <!-- General Error Message -->
      <div th:if="${errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${errorMessage}"></span>
      </div>

      <!-- Registration Form -->
      <form th:action="@{/register}" th:object="${user}" method="post" class="auth-form">
        
        <div class="auth-grid-2">
            <!-- First Name -->
            <div>
                <div class="auth-input-group">
                  <div class="auth-input-icon-left"><i data-feather="user" class="auth-icon"></i></div>
                  <input th:field="*{firstName}" id="firstName" required type="text"
                    class="auth-input" placeholder="First Name" />
                </div>
                <div id="error-firstName" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>
            </div>
            
            <!-- Last Name -->
            <div>
                <div class="auth-input-group">
                  <div class="auth-input-icon-left"><i data-feather="user" class="auth-icon"></i></div>
                  <input th:field="*{lastName}" id="lastName" required type="text"
                    class="auth-input" placeholder="Last Name" />
                </div>
                <div id="error-lastName" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>
            </div>
        </div>

        <div class="auth-grid-2">
            <!-- Username -->
            <div>
                <div class="auth-input-group">
                  <div class="auth-input-icon-left"><i data-feather="at-sign" class="auth-icon"></i></div>
                  <input th:field="*{username}" id="username" required type="text"
                    class="auth-input" placeholder="Username" />
                </div>
                <div id="error-username" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>
            </div>
            
            <!-- Phone -->
            <div>
                <div class="auth-input-group">
                  <div class="auth-input-icon-left"><i data-feather="phone" class="auth-icon"></i></div>
                  <input th:field="*{phone}" id="phoneNumber" required type="tel"
                    class="auth-input" placeholder="Phone Number" />
                </div>
                <div id="error-phone" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>
            </div>
        </div>

        <!-- Email -->
        <div>
            <div class="auth-input-group">
              <div class="auth-input-icon-left"><i data-feather="mail" class="auth-icon"></i></div>
              <input th:field="*{email}" id="email" required type="email"
                class="auth-input" placeholder="Email Address" />
            </div>
            <div id="error-email" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>
        </div>

        <div class="auth-grid-2">
            <!-- Password -->
            <div>
                <div class="auth-input-group">
                  <div class="auth-input-icon-left"><i data-feather="lock" class="auth-icon"></i></div>
                  <input th:field="*{passwordHash}" id="password" required type="password"
                    class="auth-input-password" placeholder="Password" />
                  <button type="button" onclick="togglePassword('password', 'eye-icon-1')" class="auth-input-icon-right">
                    <i id="eye-icon-1" data-feather="eye" class="auth-icon"></i>
                  </button>
                </div>
                <div id="error-password" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>

                <!-- Password Strength Meter -->
                <div id="password-strength-box" style="display:none; margin-top: 10px;">
                    <div style="display:flex; gap:4px; margin-bottom:8px;">
                        <div id="bar-1" class="pw-bar"></div>
                        <div id="bar-2" class="pw-bar"></div>
                        <div id="bar-3" class="pw-bar"></div>
                        <div id="bar-4" class="pw-bar"></div>
                        <div id="bar-5" class="pw-bar"></div>
                    </div>
                    <div id="strength-label" style="font-size:0.75rem; font-weight:600; margin-bottom:8px; color:var(--text-main);"></div>
                    <ul style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:4px; font-size:0.8rem;">
                        <li id="check-length"  class="pw-check"><span class="pw-dot">●</span> Ít nhất 8 ký tự</li>
                        <li id="check-upper"   class="pw-check"><span class="pw-dot">●</span> Có chữ hoa (A-Z)</li>
                        <li id="check-lower"   class="pw-check"><span class="pw-dot">●</span> Có chữ thường (a-z)</li>
                        <li id="check-number"  class="pw-check"><span class="pw-dot">●</span> Có chữ số (0-9)</li>
                        <li id="check-special" class="pw-check"><span class="pw-dot">●</span> Ký tự đặc biệt (@$!%*?&amp;)</li>
                    </ul>
                </div>
            </div>
            
            <!-- Confirm Password -->
            <div>
                <div class="auth-input-group">
                  <div class="auth-input-icon-left"><i data-feather="lock" class="auth-icon"></i></div>
                  <input id="confirmPassword" required type="password"
                    class="auth-input-password" placeholder="Confirm Password" />
                  <button type="button" onclick="togglePassword('confirmPassword', 'eye-icon-2')" class="auth-input-icon-right">
                    <i id="eye-icon-2" data-feather="eye" class="auth-icon"></i>
                  </button>
                </div>
                <div id="error-confirmPassword" style="font-size: 0.75rem; color: #ef4444; margin-top: 0.25rem;"></div>
            </div>
        </div>

        <button type="submit" class="auth-btn-primary" style="margin-top: 0.5rem;">
            Create Account
        </button>
        
        <!-- Google Button -->
        <div class="auth-divider">
            <span class="auth-divider-text">OR</span>
        </div>

        <a href="/oauth2/authorization/google" class="auth-btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google icon">
          Sign up with Google
        </a>
      </form>

      <!-- Footer Login Link -->
      <p class="mt-8 text-center text-sm text-stone-600">
        Already have an account? 
        <a href="/login" class="auth-link font-semibold">
          Login here
        </a>
      </p>

    </div>
  </div>
</div>

<script th:src="@{/js/mark_password.js}"></script>
<script>
    feather.replace();

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === "password") {
        input.type = "text";
        icon.setAttribute('data-feather', 'eye-off');
      } else {
        input.type = "password";
        icon.setAttribute('data-feather', 'eye');
      }
      feather.replace();
    }

    document.addEventListener("DOMContentLoaded", () => {
        const form = document.querySelector("form");
        const passwordField = document.getElementById("password");
        const confirmPasswordField = document.getElementById("confirmPassword");

        function setError(id, message) {
            const errorElement = document.getElementById(id);
            if (errorElement) {
                errorElement.innerText = message;
            }
        }

        function clearError(id) {
            const errorElement = document.getElementById(id);
            if (errorElement) {
                errorElement.innerText = "";
            }
        }

        function validatePasswordMatch() {
            if (!passwordField || !confirmPasswordField) return true;
            const passwordValue = passwordField.value;
            const confirmValue = confirmPasswordField.value;

            if (confirmValue.trim() === "") {
                clearError("error-confirmPassword");
                return true;
            }

            if (passwordValue === confirmValue) {
                clearError("error-confirmPassword");
                return true;
            } else {
                setError("error-confirmPassword", "Passwords do not match.");
                return false;
            }
        }

        if (passwordField && confirmPasswordField) {
            passwordField.addEventListener("input", validatePasswordMatch);
            confirmPasswordField.addEventListener("input", validatePasswordMatch);
        }

        if (form) {
            form.addEventListener("submit", function (e) {
                let valid = true;

                const firstName = document.getElementById("firstName")?.value?.trim() || "";
                const lastName = document.getElementById("lastName")?.value?.trim() || "";
                const username = document.getElementById("username")?.value?.trim() || "";
                const email = document.getElementById("email")?.value?.trim() || "";
                const phone = document.getElementById("phoneNumber")?.value?.trim() || "";
                const password = passwordField?.value?.trim() || "";

                clearError("error-firstName");
                clearError("error-lastName");
                clearError("error-username");
                clearError("error-email");
                clearError("error-phone");
                clearError("error-password");
                clearError("error-confirmPassword");

                if (!firstName) {
                    setError("error-firstName", "Required");
                    valid = false;
                } else if (!/^[\p{L} ]+$/u.test(firstName)) {
                    setError("error-firstName", "Letters only");
                    valid = false;
                }

                if (!lastName) {
                    setError("error-lastName", "Required");
                    valid = false;
                } else if (!/^[\p{L} ]+$/u.test(lastName)) {
                    setError("error-lastName", "Letters only");
                    valid = false;
                }

                if (!username) {
                    setError("error-username", "Required");
                    valid = false;
                } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    setError("error-username", "Letters, digits, _ only");
                    valid = false;
                }

                if (!email) {
                    setError("error-email", "Required");
                    valid = false;
                } else if (!/^[\w._%+-]+@[\w.-]+\.[a-zA-Z]{2,6}$/.test(email)) {
                    setError("error-email", "Invalid email format");
                    valid = false;
                }

                if (!phone) {
                    setError("error-phone", "Required");
                    valid = false;
                } else if (!/^\d{10}$/.test(phone)) {
                    setError("error-phone", "Must contain 10 digits");
                    valid = false;
                }

                let passwordValid = true;
                if (passwordField) { 
                    if (!password) {
                        setError("error-password", "Required");
                        passwordValid = false;
                    } else if (password.length < 8 || password.length > 64) {
                        setError("error-password", "8-64 characters");
                        passwordValid = false;
                    }
                }
                if (!passwordValid) valid = false;

                if (confirmPasswordField) {
                    const match = validatePasswordMatch();
                    if (!match) {
                        valid = false;
                        if (valid) confirmPasswordField.focus();
                    }
                }

                if (!valid) {
                    e.preventDefault();
                }
            });
        }
    });
</script>

</body>
</html>
