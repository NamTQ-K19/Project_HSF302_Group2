
spring.application.name=Project_HSF302_Group2

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=coffee_shop;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate ddl-auto (update để tự động tạo bảng)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
server.port=8080
server.tomcat.connection-timeout=60000
server.tomcat.max-connections=200
server.tomcat.max-threads=200
server.tomcat.chunked-encoding-threshold=0
server.servlet.context-path=/
server.error.include-stacktrace=never
server.error.include-message=always
server.compression.enabled=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

logging.level.hsf302.se2033jv=DEBUG
