<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle != null ? pageTitle + ' – CafeShop Manager' : 'CafeShop Manager'}">CafeShop Manager</title>
    <link th:href="@{/css/customer/customer-profile-layout.css}" rel="stylesheet"/>
    <link th:href="@{/css/manager/manager-layout.css}" rel="stylesheet"/>
    <!-- Page-specific CSS slot -->
    <th:block th:replace="${pageCss}"></th:block>
</head>
<body class="manager-body">

<div class="manager-app">

    <!-- ══ LEFT SIDEBAR ═════════════════════════════════════ -->
    <aside class="manager-sidebar">

        <!-- Brand -->
        <div class="sidebar-brand">
            <span class="brand-icon">☕</span>
            <div>
                <div class="brand-name">CafeShop</div>
                <div class="brand-role">Quản lý</div>
            </div>
        </div>

        <!-- Nav items -->
        <nav class="sidebar-nav">
            <a th:href="@{/manager/dashboard}"
               th:classappend="${activePage == 'dashboard'} ? ' active'"
               class="sidebar-nav-item">
                <span class="nav-icon">📊</span>
                <span>Tổng quan</span>
            </a>
            <a th:href="@{/manager/reservations}"
               th:classappend="${activePage == 'reservations'} ? ' active'"
               class="sidebar-nav-item">
                <span class="nav-icon">📅</span>
                <span>Lịch đặt bàn</span>
            </a>
            <a th:href="@{/manager/products}"
               th:classappend="${activePage == 'products'} ? ' active'"
               class="sidebar-nav-item">
                <span class="nav-icon">☕</span>
                <span>Sản phẩm</span>
            </a>
            <a th:href="@{/manager/reports}"
               th:classappend="${activePage == 'reports'} ? ' active'"
               class="sidebar-nav-item">
                <span class="nav-icon">📈</span>
                <span>Báo cáo</span>
            </a>
        </nav>

        <!-- Logout -->
        <div class="sidebar-footer">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-sidebar-logout">
                    <span>🚪</span> Đăng xuất
                </button>
            </form>
        </div>

    </aside>

    <!-- ══ MAIN CONTENT ══════════════════════════════════════ -->
    <main class="manager-main">

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}"   class="alert alert-error"   th:text="${errorMessage}"></div>

        <!-- Page content slot -->
        <th:block th:replace="${pageContent}"></th:block>

    </main>

</div>

<!-- Page-specific JS slot -->
<th:block th:replace="${pageJs}"></th:block>
</body>
</html>
