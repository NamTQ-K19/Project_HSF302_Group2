<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Đổi mật khẩu – BrewMaster</title>
    
    <!-- Tailwind CSS config -->
    <div th:replace="~{catalog/tailwind-head :: tailwind-head}"></div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <style>
        .pw-bar {
            flex: 1;
            height: 4px;
            background-color: #e2e8f0;
            border-radius: 2px;
            transition: background-color 0.3s;
        }
        .pw-check {
            color: #94a3b8;
            transition: color 0.3s;
        }
        .pw-check.valid {
            color: #22c55e;
        }
        .pw-dot {
            display: inline-block;
            margin-right: 4px;
            font-size: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed antialiased">

<div th:replace="~{catalog/navbar :: navbar}"></div>

<main class="max-w-max-width mx-auto px-margin-desktop py-12 min-h-[70vh]">

    <!-- Flash messages are now handled globally via toast fragment in footer -->

    <div class="flex flex-col lg:flex-row gap-8">

        <!-- ══ LEFT: Avatar sidebar ═══════════════════════════ -->
        <aside class="w-full lg:w-80 shrink-0">
            <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl p-8 flex flex-col items-center text-center sticky top-28 shadow-sm">
                <!-- Avatar display -->
                <div class="relative mb-4 group">
                    <div class="w-32 h-32 rounded-full overflow-hidden bg-primary-container text-primary flex items-center justify-center font-bold text-[48px] shadow-sm border-4 border-white ring-1 ring-outline-variant">
                        <img th:if="${user.avatarUrl != null}" th:src="${user.avatarUrl}" class="w-full h-full object-cover" alt="Avatar"/>
                        <span th:unless="${user.avatarUrl != null}" th:text="${#strings.substring(user.firstName, 0, 1)}">A</span>
                    </div>
                </div>

                <div class="font-bold text-headline-sm text-primary mb-1" th:text="${user.firstName + ' ' + user.lastName}"></div>
                <div class="text-on-surface-variant text-body-md mb-6" th:text="${'@' + user.username}"></div>

                <div th:replace="~{customer/sidebar-menu :: sidebar-menu('changePassword')}"></div>
            </div>
        </aside>

        <!-- ══ RIGHT: Main content ════════════════════════════ -->
        <div class="flex-1 flex flex-col gap-6">

            <!-- ── Card 1: Change Password ─────────────── -->
            <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl overflow-hidden shadow-sm">
                <div class="px-8 py-5 border-b border-outline-variant bg-surface-container-low/50 flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">lock</span>
                    <h2 class="font-headline-sm text-primary m-0">Thay đổi mật khẩu</h2>
                </div>
                <div class="p-8">
                    <form th:action="@{/profile/changePassword}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" th:value="${user.userId}" name="userId">

                        <div class="grid grid-cols-1 gap-6 mb-8 max-w-lg">
                            <div>
                                <label class="block text-body-sm font-bold text-on-surface mb-2">Mật khẩu hiện tại <span class="text-error">*</span></label>
                                <div class="relative">
                                    <input type="password" id="currentPassword" name="currentPassword" class="w-full bg-surface-container-lowest border border-outline rounded-xl p-3 pr-12 text-body-md focus:border-primary focus:ring-0 outline-none transition-colors" required placeholder="Nhập mật khẩu hiện tại của bạn" />
                                    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors border-none bg-transparent cursor-pointer flex items-center justify-center p-1" onclick="togglePassword('currentPassword', 'eye-icon-1')">
                                        <span id="eye-icon-1" class="material-symbols-outlined text-[20px]">visibility</span>
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label class="block text-body-sm font-bold text-on-surface mb-2">Mật khẩu mới <span class="text-error">*</span></label>
                                <div class="relative">
                                    <input type="password" id="newPassword" name="newPassword" class="w-full bg-surface-container-lowest border border-outline rounded-xl p-3 pr-12 text-body-md focus:border-primary focus:ring-0 outline-none transition-colors" required placeholder="Nhập mật khẩu mới" />
                                    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors border-none bg-transparent cursor-pointer flex items-center justify-center p-1" onclick="togglePassword('newPassword', 'eye-icon-2')">
                                        <span id="eye-icon-2" class="material-symbols-outlined text-[20px]">visibility</span>
                                    </button>
                                </div>
                                <!-- Password Strength Meter -->
                                <div id="password-strength-box" class="mt-4 mb-2" style="display:none;">
                                    <div class="flex gap-1 mb-2">
                                        <div id="bar-1" class="pw-bar"></div>
                                        <div id="bar-2" class="pw-bar"></div>
                                        <div id="bar-3" class="pw-bar"></div>
                                        <div id="bar-4" class="pw-bar"></div>
                                        <div id="bar-5" class="pw-bar"></div>
                                    </div>
                                    <div id="strength-label" class="text-[12px] font-bold text-on-surface-variant mb-2"></div>
                                    <ul class="list-none p-0 m-0 flex flex-col gap-1 text-[13px]">
                                        <li id="check-length"  class="pw-check"><span class="pw-dot">●</span> Ít nhất 8 ký tự</li>
                                        <li id="check-upper"   class="pw-check"><span class="pw-dot">●</span> Có chữ hoa (A-Z)</li>
                                        <li id="check-lower"   class="pw-check"><span class="pw-dot">●</span> Có chữ thường (a-z)</li>
                                        <li id="check-number"  class="pw-check"><span class="pw-dot">●</span> Có chữ số (0-9)</li>
                                        <li id="check-special" class="pw-check"><span class="pw-dot">●</span> Có ký tự đặc biệt (@$!%*?&...)</li>
                                    </ul>
                                </div>
                            </div>

                            <div>
                                <label class="block text-body-sm font-bold text-on-surface mb-2">Xác nhận mật khẩu mới <span class="text-error">*</span></label>
                                <div class="relative">
                                    <input type="password" id="confirmPassword" name="confirmPassword" class="w-full bg-surface-container-lowest border border-outline rounded-xl p-3 pr-12 text-body-md focus:border-primary focus:ring-0 outline-none transition-colors" required placeholder="Nhập lại mật khẩu mới" />
                                    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors border-none bg-transparent cursor-pointer flex items-center justify-center p-1" onclick="togglePassword('confirmPassword', 'eye-icon-3')">
                                        <span id="eye-icon-3" class="material-symbols-outlined text-[20px]">visibility</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <button type="submit" class="bg-primary text-white px-6 py-3 rounded-full font-bold text-body-sm hover:opacity-90 transition-opacity border-none cursor-pointer flex items-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">save</span> Lưu thay đổi
                            </button>
                            <a href="/customer/profile" class="bg-surface-container border border-outline-variant text-on-surface-variant px-6 py-3 rounded-full font-bold text-body-sm hover:bg-surface-container-high transition-colors cursor-pointer no-underline flex items-center justify-center">
                                Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{catalog/footer :: footer}"></div>

<script th:src="@{/js/mark_password.js}"></script>
<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
            input.type = "text";
            icon.textContent = "visibility_off";
        } else {
            input.type = "password";
            icon.textContent = "visibility";
        }
    }
</script>

</body>
</html>
