<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Hồ sơ của tôi – Cafe Shop</title>
    <link th:href="@{/css/customer/profile.css}" rel="stylesheet"/>
</head>
<body>

<div class="page-wrapper">

    <!-- ── Flash messages ─────────────────────────────────── -->
    <div th:if="${successMessage}"
         class="alert alert-success"
         th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"
         class="alert alert-error"
         th:text="${errorMessage}"></div>

    <div class="profile-layout">

        <!-- ══ LEFT: Avatar sidebar ═══════════════════════════ -->
        <aside class="avatar-sidebar">

            <!-- Avatar display -->
            <div class="avatar-img-wrap">
                <img th:if="${user.avatarUrl != null}"
                     th:src="${user.avatarUrl}"
                     class="avatar-img" alt="Avatar"/>
                <div th:unless="${user.avatarUrl != null}"
                     class="avatar-placeholder">👤</div>
            </div>

            <div class="avatar-name"
                 th:text="${user.firstName + ' ' + user.lastName}"></div>
            <div class="avatar-username"
                 th:text="${'@' + user.username}"></div>

            <!-- Avatar upload form -->
            <form th:action="@{/customer/profile/avatar}"
                  method="post"
                  enctype="multipart/form-data"
                  id="avatarForm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <label class="avatar-upload-label" for="avatarFile">
                    📷 Thay đổi ảnh
                </label>
                <input type="file"
                       id="avatarFile"
                       name="avatarFile"
                       accept="image/jpeg,image/png,image/webp"
                       style="display:none"
                       onchange="document.getElementById('avatarForm').submit()"/>
            </form>

            <div class="avatar-hint">Định dạng JPG, PNG hoặc WEBP · Dung lượng tối đa 5MB</div>

            <br>

            <label class="avatar-upload-label"><a href="/profile/changePassword">Change Password</a></label>
        </aside>

        <!-- ══ RIGHT: Main content ════════════════════════════ -->
        <div class="profile-main">

            <!-- ── Card 1: Personal Information ─────────────── -->
            <div class="card">
                <div class="card-header">
                    <span>👤</span>
                    <h2>Thông tin cá nhân</h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/customer/profile/update}"
                          th:object="${profileForm}"
                          method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="form-grid-2">

                            <div class="form-group">
                                <label class="form-label">
                                    Họ <span class="required">*</span>
                                </label>
                                <input type="text"
                                       th:field="*{firstName}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                       required
                                />
                                <div th:if="${#fields.hasErrors('firstName')}"
                                     class="form-error"
                                     th:errors="*{firstName}"></div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Tên <span class="required">*</span>
                                </label>
                                <input type="text"
                                       th:field="*{lastName}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                       required
                                />
                                <div th:if="${#fields.hasErrors('lastName')}"
                                     class="form-error"
                                     th:errors="*{lastName}"></div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Tên người dùng <span class="required">*</span>
                                </label>
                                <input type="text"
                                       th:field="*{username}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                       required
                                />
                                <div th:if="${#fields.hasErrors('username')}"
                                     class="form-error"
                                     th:errors="*{username}"></div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">
                                    Số điện thoại <span class="required">*</span>
                                </label>
                                <input type="text"
                                       th:field="*{phone}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'"
                                       required
                                       pattern="0[0-9]{9}"
                                       minlength="10"
                                       maxlength="10"
                                       title="Vui lòng nhập đúng số điện thoại 10 số, bắt đầu bằng số 0"
                                       oninput="this.value = this.value.replace(/[^0-9]/g, '')"/>
                                <div th:if="${#fields.hasErrors('phone')}"
                                     class="form-error"
                                     th:errors="*{phone}"></div>
                            </div>

                            <div class="form-group form-grid-full">
                                <label class="form-label">
                                    Email <span class="required">*</span>
                                </label>
                                <input type="email"
                                       th:field="*{email}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                        required/>
                                <div th:if="${#fields.hasErrors('email')}"
                                     class="form-error"
                                     th:errors="*{email}"></div>
                                <div class="form-hint">
                                    ⚠ Việc thay đổi email yêu cầu xác minh mật khẩu và mã OTP.
                                </div>
                            </div>

                        </div><!-- /form-grid-2 -->

                        <div style="display:flex; gap:10px; margin-top:8px;">
                            <button type="submit" class="btn btn-primary">
                                💾 Lưu thay đổi
                            </button>
                            <a th:href="@{/templates/customer/profile}"
                               class="btn btn-secondary">Hủy</a>
                        </div>

                    </form>
                </div>
            </div>
            <!-- /Card 1 -->

            <!-- ── Card 2: Delivery Addresses ─────────────── -->
            <div class="card">
                <div class="card-header">
                    <span>📍</span>
                    <h2>Địa chỉ giao hàng</h2>
                </div>
                <div class="card-body">

                    <!-- Existing addresses -->
                    <div class="address-list">

                        <div th:each="addr : ${addresses}" class="address-item">
                            <div>
                                <div class="address-label"
                                     th:text="${addr.label != null ? addr.label : 'Address'}">
                                </div>
                                <div class="address-full"
                                     th:text="${addr.fullAddress}"></div>
                                <div class="address-meta">
                                    <span th:text="${addr.recipientName}"></span>
                                    &nbsp;·&nbsp;
                                    <span th:text="${addr.recipientPhone}"></span>
                                </div>
                            </div>
                            <div class="address-actions">
                                <!-- Edit button (opens modal) -->
                                <button type="button"
                                        class="btn btn-secondary btn-sm"
                                        th:data-id="${addr.addressId}"
                                        th:data-label="${addr.label}"
                                        th:data-address="${addr.fullAddress}"
                                        th:data-name="${addr.recipientName}"
                                        th:data-phone="${addr.recipientPhone}"
                                        onclick="openEditModal(
                                        this.getAttribute('data-id'),
                                        this.getAttribute('data-label'),
                                        this.getAttribute('data-address'),
                                        this.getAttribute('data-name'),
                                        this.getAttribute('data-phone')
                                    )">
                                    ✏ Sửa
                                </button>
                                <!-- Delete -->
                                <form th:action="@{'/customer/profile/address/' + ${addr.addressId} + '/delete'}"
                                      method="post"
                                      onsubmit="return confirm('Bạn có chắc muốn xóa địa chỉ này không?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit"
                                            class="btn btn-danger btn-sm">
                                        🗑 Xóa
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- Empty state -->
                        <div th:if="${#lists.isEmpty(addresses)}"
                             style="text-align:center; color:var(--text-muted);
                                    padding:20px; font-size:14px;">
                            Chưa có địa chỉ nào. Vui lòng thêm địa chỉ của bạn bên dưới.
                        </div>

                    </div>
                    <!-- /address-list -->

                    <!-- Toggle add form -->
                    <div style="margin-top:16px;">
                        <button type="button"
                            class="add-address-toggle"
                            id="toggleAddBtn"
                            onclick="toggleAddForm()">
                            + Thêm địa chỉ mới
                        </button>

                        <!-- Add form (hidden by default, shown if showAddressForm) -->
                        <div class="add-address-form"
                             id="addAddressForm"
                             th:classappend="${showAddressForm} ? 'visible'">

                            <div class="section-title">Thêm địa chỉ mới</div>

                            <form th:action="@{/customer/profile/address/add}"
                                  th:object="${addressForm}"
                                  method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <div class="form-grid-2">
                                    <div class="form-group">
                                        <label class="form-label">Nhãn (Nhà, Cơ quan, ...)</label>
                                        <select th:field="*{label}" class="form-control">
                                            <option value="">-- Không chọn --</option>
                                            <option value="Nhà">Nhà</option>
                                            <option value="Cơ quan">Cơ quan</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">
                                            Số điện thoại người nhận <span class="required">*</span>
                                        </label>
                                        <input type="text"
                                               th:field="*{recipientPhone}"
                                               class="form-control"
                                               th:classappend="${#fields.hasErrors('recipientPhone')} ? 'is-invalid'"
                                               required
                                               pattern="0[0-9]{9}"
                                               minlength="10"
                                               maxlength="10"
                                               title="Vui lòng nhập đúng số điện thoại 10 số, bắt đầu bằng số 0"
                                               oninput="this.value = this.value.replace(/[^0-9]/g, '')"/>
                                        <div th:if="${#fields.hasErrors('recipientPhone')}"
                                             class="form-error"
                                             th:errors="*{recipientPhone}"></div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">
                                            Tên người nhận <span class="required">*</span>
                                        </label>
                                        <input type="text"
                                               th:field="*{recipientName}"
                                               class="form-control"
                                               th:classappend="${#fields.hasErrors('recipientName')} ? 'is-invalid'"
                                                required />
                                        <div th:if="${#fields.hasErrors('recipientName')}"
                                             class="form-error"
                                             th:errors="*{recipientName}"></div>
                                    </div>
                                    <div class="form-group form-grid-full">
                                        <label class="form-label">
                                            Địa chỉ đầy đủ <span class="required">*</span>
                                        </label>
                                        <input type="text"
                                               th:field="*{fullAddress}"
                                               class="form-control"
                                               th:classappend="${#fields.hasErrors('fullAddress')} ? 'is-invalid'"
                                                placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành"
                                                required/>
                                        <div th:if="${#fields.hasErrors('fullAddress')}"
                                             class="form-error"
                                             th:errors="*{fullAddress}"></div>
                                    </div>
                                </div>

                                <div style="display:flex; gap:10px;">
                                    <button type="submit"
                                            class="btn btn-primary btn-sm">
                                        💾 Lưu địa chỉ
                                    </button>
                                    <button type="button"
                                            class="btn btn-secondary btn-sm"
                                            onclick="toggleAddForm()">
                                        Hủy
                                    </button>
                                </div>
                            </form>
                        </div>
                        <!-- /add-address-form -->
                    </div>

                </div>
            </div>
            <!-- /Card 2 -->

        </div>
        <!-- /profile-main -->
    </div>
    <!-- /profile-layout -->
</div>
<!-- /page-wrapper -->

<!-- ══ Edit Address Modal ═══════════════════════════════════ -->
<div id="editModal"
     style="display:none; position:fixed; inset:0;
             background:rgba(0,0,0,.45); z-index:200;
             flex-direction:column;
             align-items:center; justify-content:center;">
    <div style="background:var(--white); border-radius:var(--radius-lg);
                padding:28px 28px 20px; width:100%; max-width:480px;
                box-shadow:var(--shadow-lg); margin:20px;">

        <div style="font-size:17px; font-weight:700;
                    color:var(--coffee-dark); margin-bottom:20px;">
            ✏ Sửa địa chỉ
        </div>

        <form id="editAddressForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label" for="edit_label">Nhãn (Nhà, Cơ quan, ...)</label>
                <select id="edit_label" name="label" class="form-control">
                    <option value="">-- Không chọn --</option>
                    <option value="Nhà">Nhà</option>
                    <option value="Cơ quan">Cơ quan</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">
                    Địa chỉ đầy đủ <span class="required">*</span>
                </label>
                <input type="text" id="edit_fullAddress" name="fullAddress"
                       class="form-control" required/>
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">
                        Tên người nhận <span class="required">*</span>
                    </label>
                    <input type="text" id="edit_recipientName"
                           name="recipientName"
                           class="form-control" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">
                        Số điện thoại người nhận <span class="required">*</span>
                    </label>
                    <input type="text" id="edit_recipientPhoneInput"
                           name="recipientPhone"
                           class="form-control"
                           required
                           pattern="0[0-9]{9}"
                           minlength="10"
                           maxlength="10"
                           title="Vui lòng nhập đúng số điện thoại 10 số, bắt đầu bằng số 0"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"/>
                    <div id="editPhoneError" class="form-error" style="display:none;"></div>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:8px;">
                <button type="submit" class="btn btn-primary btn-sm">
                    💾 Lưu
                </button>
                <button type="button"
                        class="btn btn-secondary btn-sm"
                        onclick="closeEditModal()">Hủy</button>
            </div>
        </form>
    </div>
</div>

<!-- If controller requests opening edit modal (e.g. validation error), pre-fill and open it -->
<div th:if="${openEditModal}">
    <script th:inline="javascript">
        /*<![CDATA[*/
        (function(){
            var id = /*[[${editAddressId}]]*/ 0;
            var label = /*[[${editLabel}]]*/ '';
            var fullAddress = /*[[${editFullAddress}]]*/ '';
            var recipientName = /*[[${editRecipientName}]]*/ '';
            var recipientPhone = /*[[${editRecipientPhone}]]*/ '';
            var phoneError = /*[[${editPhoneError}]]*/ '';

            // set values into edit modal fields
            var elLabel = document.getElementById('edit_label');
            if (elLabel) elLabel.value = label;
            var elFull = document.getElementById('edit_fullAddress');
            if (elFull) elFull.value = fullAddress;
            var elName = document.getElementById('edit_recipientName');
            if (elName) elName.value = recipientName;
            var elPhone = document.getElementById('edit_recipientPhoneInput');
            if (elPhone) elPhone.value = recipientPhone;

            // Display phone error if exists
            if (phoneError) {
                var phoneErrorDiv = document.getElementById('editPhoneError');
                var phoneInput = document.getElementById('edit_recipientPhoneInput');
                if (phoneErrorDiv) {
                    phoneErrorDiv.textContent = phoneError;
                    phoneErrorDiv.style.display = 'block';
                }
                if (phoneInput) {
                    phoneInput.classList.add('is-invalid');
                }
            }

            // set form action to submit to the edit endpoint
            var form = document.getElementById('editAddressForm');
            if (form) {
                form.action = /*[[@{/customer/profile/address/}]]*/ '' + id + '/edit';
            }

            // show modal
            var modal = document.getElementById('editModal');
            if (modal) modal.style.display = 'flex';
        })();
        /*]]>*/
    </script>
</div>

<script th:inline="javascript">
    // ── Add address form toggle ────────────────────────────────
    function toggleAddForm() {
        const form = document.getElementById('addAddressForm');
        const btn  = document.getElementById('toggleAddBtn');
        form.classList.toggle('visible');
        btn.textContent = form.classList.contains('visible')
            ? '✕ Đóng'
            : '+ Thêm địa chỉ mới';
    }

    // ── Edit modal ─────────────────────────────────────────────
    const ctx = /*[[@{/}]]*/ '';

    var baseUrl = /*[[@{/customer/profile/address/}]]*/ '/default-path/';

    function openEditModal(id, label, fullAddress, recipientName, recipientPhone) {
        document.getElementById('edit_label').value         = label;
        document.getElementById('edit_fullAddress').value   = fullAddress;
        document.getElementById('edit_recipientName').value = recipientName;
        document.getElementById('edit_recipientPhoneInput').value = recipientPhone;
        var form = document.getElementById('editAddressForm');
        form.action = baseUrl + id + '/edit';
        const modal = document.getElementById('editModal');
        modal.style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
        // Clear the error when closing
        var phoneError = document.getElementById('editPhoneError');
        if (phoneError) {
            phoneError.style.display = 'none';
            phoneError.textContent = '';
        }
        var phoneInput = document.getElementById('edit_recipientPhoneInput');
        if (phoneInput) {
            phoneInput.classList.remove('is-invalid');
        }
    }

    document.getElementById('editAddressForm').addEventListener('submit', function(e) {
        // Ép trình duyệt kiểm tra lại toàn bộ rule (required, pattern, minlength...)
        if (!this.checkValidity()) {
            e.preventDefault(); // CHẶN NGAY LẬP TỨC nếu có lỗi

            // Chủ động hiện dòng chữ đỏ báo lỗi nếu trình duyệt không chịu hiện popup
            const phoneError = document.getElementById('editPhoneError');
            const phoneInput = document.getElementById('edit_recipientPhoneInput');

            phoneInput.classList.add('is-invalid');
            phoneError.textContent = "Vui lòng nhập đúng 10 số, bắt đầu bằng số 0.";
            phoneError.style.display = 'block';
        }
    });

    // Click overlay to close
    document.getElementById('editModal')
        .addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });
</script>
</body>
</html>
