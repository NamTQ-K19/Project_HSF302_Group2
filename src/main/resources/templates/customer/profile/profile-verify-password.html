<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Xác nhận mật khẩu – Cafe Shop</title>
    <link th:href="@{/css/customer/profile.css}" rel="stylesheet"/>
</head>
<body>

<nav class="navbar">
    <a class="navbar-brand" th:href="@{/static}">☕ <span>Cafe</span>Shop</a>
</nav>

<div class="verify-wrap">
    <div class="verify-card">

        <div class="verify-icon">🔒</div>
        <div class="verify-title">Xác nhận mật khẩu của bạn</div>
        <div class="verify-subtitle">
            Bạn đang thay đổi email thành<br/>
            <strong th:text="${newEmail}"></strong><br/>
            Vui lòng nhập mật khẩu hiện tại để tiếp tục.
        </div>

        <div th:if="${errorMessage}"
             class="alert alert-error"
             th:text="${errorMessage}"></div>

        <form th:action="@{/customer/profile/verify-password}"
              th:object="${passwordForm}"
              method="post">

            <input type="hidden" name="newEmail"
                   th:value="${newEmail}"/>
            <input type="hidden" name="username" th:value="${username}"/>
            <input type="hidden" name="firstName"
                   th:value="${profileData.firstName}"/>
            <input type="hidden" name="lastName"
                   th:value="${profileData.lastName}"/>
            <input type="hidden" name="phone"
                   th:value="${profileData.phone}"/>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label class="form-label">
                    Mật khẩu hiện tại <span class="required">*</span>
                </label>
                <input type="password"
                       th:field="*{currentPassword}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"
                        placeholder="Nhập mật khẩu hiện tại của bạn"
                       autofocus/>
                <div th:if="${#fields.hasErrors('currentPassword')}"
                     class="form-error"
                     th:errors="*{currentPassword}"></div>
            </div>

            <div style="display:flex; gap:10px; margin-top:6px;">
                <button type="submit" class="btn btn-primary btn-full">
                    ✅ Xác nhận & gửi OTP
                </button>
            </div>
        </form>

        <div style="text-align:center; margin-top:16px;">
                <a th:href="@{/templates/customer/profile}"
                   style="font-size:13px; color:var(--text-muted);">
                    ← Quay lại Hồ sơ
                </a>
        </div>

    </div>
</div>

</body>
</html>
