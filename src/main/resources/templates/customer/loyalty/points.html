<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Điểm tích lũy – BrewMaster</title>
    
    <!-- Tailwind CSS config -->
    <div th:replace="~{catalog/tailwind-head :: tailwind-head}"></div>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed antialiased">

<div th:replace="~{catalog/navbar :: navbar}"></div>

<main class="max-w-max-width mx-auto px-margin-desktop py-12 min-h-[70vh]">

    <!-- Flash messages are now handled globally via toast fragment in footer -->

    <div class="flex flex-col lg:flex-row gap-8">

        <!-- ══ LEFT: Sidebar ═══════════════════════════ -->
        <aside class="w-full lg:w-80 shrink-0">
            <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl p-8 flex flex-col items-center text-center sticky top-28 shadow-sm">
                <!-- Avatar display -->
                <div class="w-32 h-32 rounded-full overflow-hidden bg-primary-container text-primary flex items-center justify-center font-bold text-[48px] shadow-sm border-4 border-white ring-1 ring-outline-variant mb-4">
                    <img th:if="${user != null and user.avatarUrl != null}" th:src="${user.avatarUrl}" class="w-full h-full object-cover" alt="Avatar"/>
                    <span th:unless="${user != null and user.avatarUrl != null}">A</span>
                </div>

                <div class="font-bold text-headline-sm text-primary mb-1" th:if="${user != null}" th:text="${user.firstName + ' ' + user.lastName}"></div>
                <div class="text-on-surface-variant text-body-md mb-6" th:if="${user != null}" th:text="${'@' + user.username}"></div>

                <!-- Points Widget -->
                <div class="w-full bg-primary-container text-on-primary-container rounded-2xl p-5 mb-6 border border-primary/20 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 opacity-10">
                        <span class="material-symbols-outlined text-[100px]">stars</span>
                    </div>
                    <div class="relative z-10 text-left">
                        <div class="font-bold text-body-sm opacity-80 uppercase tracking-wider mb-1">Điểm hiện tại</div>
                        <div class="font-headline-lg text-primary mb-1"><span th:text="${currentBalance}">0</span> <span class="text-body-md font-bold">điểm</span></div>
                        <a href="/search" class="inline-flex items-center gap-1 text-[12px] font-bold text-primary hover:underline">Sử dụng điểm ngay <span class="material-symbols-outlined text-[14px]">arrow_forward</span></a>
                    </div>
                </div>

                <div th:replace="~{customer/sidebar-menu :: sidebar-menu('points')}"></div>

            </div>
        </aside>

        <!-- ══ RIGHT: Main content ════════════════════════════ -->
        <div class="flex-1 flex flex-col gap-6">

            <!-- Filter Card -->
            <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl overflow-hidden shadow-sm">
                <div class="px-8 py-5 border-b border-outline-variant bg-surface-container-low/50 flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">filter_alt</span>
                    <h2 class="font-headline-sm text-primary m-0">Bộ lọc lịch sử</h2>
                </div>
                <div class="p-8">
                    <form th:action="@{/customer/points/filter}" method="post" id="filterForm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="page" th:value="0" id="filterPage"/>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                            <div>
                                <label class="block text-body-sm font-bold text-on-surface mb-2">Loại giao dịch</label>
                                <select name="transactionType" class="w-full bg-surface-container-lowest border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none appearance-none">
                                    <option value="">Tất cả</option>
                                    <option value="EARN" th:selected="${filter.transactionType == 'EARN'}">Tích điểm</option>
                                    <option value="REDEEM" th:selected="${filter.transactionType == 'REDEEM'}">Đổi điểm</option>
                                    <option value="ADJUST" th:selected="${filter.transactionType == 'ADJUST'}">Hoàn điểm</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-body-sm font-bold text-on-surface mb-2">Từ ngày</label>
                                <input type="date" name="fromDate" class="w-full bg-surface-container-lowest border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none" th:value="${filter.fromDate}"/>
                            </div>

                            <div>
                                <label class="block text-body-sm font-bold text-on-surface mb-2">Đến ngày</label>
                                <input type="date" name="toDate" class="w-full bg-surface-container-lowest border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none" th:value="${filter.toDate}" th:classappend="${dateError != null} ? 'border-error' : ''"/>
                                <div th:if="${dateError != null}" class="text-error text-body-sm mt-1" th:text="${dateError}"></div>
                            </div>
                        </div>

                        <div class="flex gap-4">
                            <button type="submit" class="bg-primary text-white px-6 py-3 rounded-full font-bold text-body-sm hover:opacity-90 transition-opacity border-none cursor-pointer flex items-center gap-2">
                                <span class="material-symbols-outlined text-[18px]">search</span> Lọc
                            </button>
                            <a th:href="@{/customer/points}" class="bg-surface-container border border-outline-variant text-on-surface-variant px-6 py-3 rounded-full font-bold text-body-sm hover:bg-surface-container-high transition-colors cursor-pointer flex items-center gap-2 no-underline">
                                <span class="material-symbols-outlined text-[18px]">close</span> Xóa lọc
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Transactions Card -->
            <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl overflow-hidden shadow-sm">
                <div class="px-8 py-5 border-b border-outline-variant bg-surface-container-low/50 flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">receipt_long</span>
                    <h2 class="font-headline-sm text-primary m-0">Lịch sử giao dịch</h2>
                </div>
                
                <div class="p-8">
                    <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-12 text-on-surface-variant/60 border border-outline border-dashed rounded-2xl">
                        <span class="material-symbols-outlined text-[64px] opacity-30 mb-4 block">drafts</span>
                        <h3 class="font-bold text-body-lg text-primary m-0 mb-2">Không có giao dịch</h3>
                        <p class="m-0">Bạn chưa có giao dịch điểm nào.</p>
                    </div>

                    <div th:unless="${#lists.isEmpty(transactions)}" class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[700px]">
                            <thead>
                                <tr class="text-on-surface-variant/70 text-body-sm uppercase tracking-wider border-b-2 border-outline-variant">
                                    <th class="py-4 px-2 font-semibold">STT</th>
                                    <th class="py-4 px-2 font-semibold">Ngày giờ</th>
                                    <th class="py-4 px-2 font-semibold">Giao dịch</th>
                                    <th class="py-4 px-2 font-semibold text-right">Điểm</th>
                                    <th class="py-4 px-2 font-semibold text-right">Số dư</th>
                                    <th class="py-4 px-2 font-semibold">Chi tiết</th>
                                    <th class="py-4 px-2 font-semibold">Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="tx, stat : ${transactions}" class="border-b border-outline-variant hover:bg-surface-container-lowest/50 transition-colors">
                                    <td class="py-4 px-2 font-medium text-on-surface-variant" th:text="${currentPage * pageSize + stat.count}"></td>
                                    <td class="py-4 px-2 text-on-surface-variant" th:text="${#temporals.format(tx.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                    <td class="py-4 px-2" th:switch="${tx.transactionType.value}">
                                        <span th:case="'EARN'" class="inline-flex px-3 py-1 bg-primary-container/50 text-primary font-bold text-[11px] rounded-full uppercase tracking-wider">Tích điểm</span>
                                        <span th:case="'ADJUST'" class="inline-flex px-3 py-1 bg-primary-container/50 text-primary font-bold text-[11px] rounded-full uppercase tracking-wider whitespace-nowrap">Hoàn điểm</span>
                                        <span th:case="'REDEEM'" class="inline-flex px-3 py-1 bg-error-container/50 text-error font-bold text-[11px] rounded-full uppercase tracking-wider">Đổi điểm</span>
                                    </td>
                                    <td class="py-4 px-2 text-right font-bold" th:classappend="${tx.points >= 0 ? 'text-primary' : 'text-error'}">
                                        <span th:if="${tx.points >= 0}" th:text="'+' + ${tx.points}"></span>
                                        <span th:unless="${tx.points >= 0}" th:text="${tx.points}"></span>
                                    </td>
                                    <td class="py-4 px-2 text-right font-bold text-on-surface" th:text="${tx.balanceAfter}"></td>
                                    <td class="py-4 px-2 font-medium" th:switch="${tx.referenceType.value}">
                                        <span th:case="'ORDER'" th:text="'Đơn hàng #' + ${tx.referenceId}" class="text-primary hover:underline cursor-pointer"></span>
                                        <span th:case="'REVIEW'" th:text="'Đánh giá #' + ${tx.referenceId}"></span>
                                        <span th:case="*" th:text="'-'"></span>
                                    </td>
                                    <td class="py-4 px-2 text-on-surface-variant/70 text-[13px]" th:text="${tx.note != null ? tx.note : '-'}"></td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- Pagination -->
                        <div th:if="${transactionPage.totalPages > 1}" class="flex justify-between items-center mt-6">
                            <span class="text-on-surface-variant text-body-sm">
                                Trang <strong th:text="${currentPage + 1}"></strong> / <strong th:text="${transactionPage.totalPages}"></strong> 
                                (<strong th:text="${transactionPage.totalElements}"></strong> giao dịch)
                            </span>
                            
                            <div class="inline-flex bg-surface-container border border-outline-variant rounded-full p-1 shadow-sm gap-1">
                                <button type="button" 
                                        class="px-4 py-2 rounded-full font-bold text-body-sm transition-colors border-none bg-transparent cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed hover:bg-surface-container-high hover:text-primary"
                                        th:disabled="${currentPage == 0}"
                                        th:onclick="|goToPage(${currentPage - 1})|">‹ Trước</button>

                                <span th:each="i : ${#numbers.sequence(0, transactionPage.totalPages - 1)}" class="hidden md:inline-block">
                                    <button type="button"
                                            th:class="'w-9 h-9 rounded-full flex items-center justify-center font-bold text-body-sm transition-colors border-none cursor-pointer ' + (${i == currentPage} ? 'bg-primary text-white' : 'bg-transparent text-on-surface-variant hover:bg-surface-container-high hover:text-primary')"
                                            th:text="${i + 1}"
                                            th:onclick="'goToPage(' + ${i} + ')'"></button>
                                </span>

                                <button type="button" 
                                        class="px-4 py-2 rounded-full font-bold text-body-sm transition-colors border-none bg-transparent cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed hover:bg-surface-container-high hover:text-primary"
                                        th:disabled="${currentPage >= transactionPage.totalPages - 1}"
                                        th:onclick="|goToPage(${currentPage + 1})|">Sau ›</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{catalog/footer :: footer}"></div>

<script>
function goToPage(page) {
    document.getElementById('filterPage').value = page;
    document.getElementById('filterForm').submit();
}
</script>

</body>
</html>
