<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' - BrewMaster'">BrewMaster - Hồ sơ của tôi</title>
    
    <!-- Tailwind CSS config -->
    <div th:replace="~{catalog/tailwind-head :: tailwind-head}"></div>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
    <style>
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            z-index: 9999;
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        #toast.success { border-left: 4px solid #22c55e; }
        #toast.error { border-left: 4px solid #ef4444; }
        #toastClose {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #64748b;
        }
        #toastClose:hover { color: #0f172a; }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed antialiased flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <th:block th:replace="~{admin/fragments/sidebar :: sidebar(currentPage='profile')}"></th:block>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 bg-surface-container-lowest/80 backdrop-blur-md border-b border-outline-variant px-8 py-5 flex items-center justify-between">
            <div>
                <h1 class="font-headline-sm text-on-surface m-0 font-bold">Hồ sơ của tôi</h1>
                <div class="text-body-sm text-on-surface-variant mt-1">
                    Quản lý thông tin cá nhân của bạn
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <span class="text-body-sm font-medium text-on-surface-variant hidden md:block" th:text="${currentDate}">22 Tháng 6, 2026</span>
                <a th:href="@{/admin/dashboard}" class="inline-flex items-center gap-2 bg-surface-container border border-outline-variant hover:bg-surface-container-high text-on-surface px-5 py-2.5 rounded-full font-bold text-body-sm transition-colors cursor-pointer no-underline">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span> Quay lại
                </a>
            </div>
        </header>

        <div class="p-8 max-w-[1200px] w-full mx-auto flex flex-col lg:flex-row gap-8">
            
            <!-- Avatar Sidebar -->
            <div class="w-full lg:w-80 shrink-0">
                <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl p-8 flex flex-col items-center text-center shadow-sm sticky top-8">
                    <!-- Avatar display -->
                    <div class="relative mb-4 group">
                        <div class="w-32 h-32 rounded-full overflow-hidden bg-primary-container text-primary flex items-center justify-center font-bold text-[48px] shadow-inner border-4 border-white ring-1 ring-outline-variant">
                            <th:block th:if="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}">
                                <img th:src="${#strings.startsWith(user.avatarUrl, '/uploads/avatars/') ? user.avatarUrl : '/uploads/avatars/' + user.avatarUrl}" class="w-full h-full object-cover" alt="Avatar" id="avatarPreview"/>
                            </th:block>
                            <th:block th:unless="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}">
                                <span id="avatarPlaceholder" th:text="${#strings.substring(user.fullName, 0, 1)}">A</span>
                            </th:block>
                        </div>
                        
                        <form th:action="@{/admin/profile/avatar}" method="post" enctype="multipart/form-data" id="avatarForm">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <label for="avatarFile" class="absolute bottom-0 right-0 bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center cursor-pointer shadow-md hover:scale-110 transition-transform">
                                <span class="material-symbols-outlined text-[20px]">photo_camera</span>
                            </label>
                            <input type="file" id="avatarFile" name="avatar" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none" onchange="document.getElementById('avatarForm').submit()"/>
                        </form>
                    </div>

                    <div class="font-bold text-headline-sm text-primary mb-1" th:text="${user.fullName}">Nguyễn Văn A</div>
                    <div class="text-on-surface-variant text-body-md mb-2 font-medium" th:text="${user.role}">ADMIN</div>
                    <div class="text-on-surface-variant/70 text-body-sm" th:text="${user.email}">admin@brewmaster.com</div>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="flex-1">
                <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl overflow-hidden shadow-sm">
                    <div class="px-8 py-5 border-b border-outline-variant bg-surface-container-low/50 flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">manage_accounts</span>
                        <h2 class="font-headline-sm text-primary m-0">Thông tin cá nhân</h2>
                    </div>
                    <div class="p-8">
                        <form id="profileForm" th:action="@{/admin/profile/update}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                <!-- Họ -->
                                <div>
                                    <label for="firstName" class="block text-body-sm font-bold text-on-surface mb-2">Họ <span class="text-error">*</span></label>
                                    <input type="text" id="firstName" name="firstName" th:value="${user.firstName}" placeholder="Nhập họ" maxlength="100" class="w-full bg-surface-container border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none transition-colors" required />
                                </div>
                                <!-- Tên -->
                                <div>
                                    <label for="lastName" class="block text-body-sm font-bold text-on-surface mb-2">Tên <span class="text-error">*</span></label>
                                    <input type="text" id="lastName" name="lastName" th:value="${user.lastName}" placeholder="Nhập tên" maxlength="100" class="w-full bg-surface-container border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none transition-colors" required />
                                </div>
                                <!-- Tên đăng nhập -->
                                <div>
                                    <label for="username" class="block text-body-sm font-bold text-on-surface mb-2 opacity-70">Tên đăng nhập</label>
                                    <input type="text" id="username" name="username" th:value="${user.username}" class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3 text-body-md text-on-surface-variant opacity-70 cursor-not-allowed" disabled />
                                    <div class="text-on-surface-variant/70 text-[12px] mt-2">Không thể thay đổi tên đăng nhập</div>
                                </div>
                                <!-- Email -->
                                <div>
                                    <label for="email" class="block text-body-sm font-bold text-on-surface mb-2 opacity-70">Email</label>
                                    <input type="email" id="email" name="email" th:value="${user.email}" class="w-full bg-surface-container-low border border-outline-variant rounded-xl p-3 text-body-md text-on-surface-variant opacity-70 cursor-not-allowed" disabled />
                                    <div class="text-on-surface-variant/70 text-[12px] mt-2">Không thể thay đổi email</div>
                                </div>
                                <!-- Số điện thoại -->
                                <div class="md:col-span-2">
                                    <label for="phone" class="block text-body-sm font-bold text-on-surface mb-2">Số điện thoại <span class="text-error">*</span></label>
                                    <input type="tel" id="phone" name="phone" th:value="${user.phone}" placeholder="Nhập số điện thoại" maxlength="20" class="w-full bg-surface-container border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none transition-colors" required />
                                </div>
                            </div>

                            <div class="flex gap-4">
                                <button type="submit" class="bg-primary text-white px-6 py-3 rounded-full font-bold text-body-sm hover:opacity-90 transition-opacity border-none cursor-pointer flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[18px]">save</span> Lưu thay đổi
                                </button>
                                <button type="reset" class="bg-surface-container border border-outline-variant text-on-surface-variant px-6 py-3 rounded-full font-bold text-body-sm hover:bg-surface-container-high transition-colors cursor-pointer flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[18px]">undo</span> Đặt lại
                                </button>
                                <button type="button" class="ml-auto bg-[#22c55e] text-white px-6 py-3 rounded-full font-bold text-body-sm hover:opacity-90 transition-opacity border-none cursor-pointer flex items-center gap-2" onclick="window.openPasswordModal()">
                                    <span class="material-symbols-outlined text-[18px]">key</span> Đổi mật khẩu
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

<!-- ===== MODAL ĐỔI MẬT KHẨU ===== -->
<div id="passwordModal" style="display:none;" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
    <div class="bg-surface-container-lowest rounded-3xl p-8 w-full max-w-md mx-4 shadow-xl relative">
        <div class="flex items-center justify-between mb-6">
            <h3 class="font-headline-sm text-on-surface m-0 font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">key</span> Đổi mật khẩu
            </h3>
            <button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container hover:bg-error/10 hover:text-error text-on-surface-variant transition-colors border-none cursor-pointer" onclick="window.closePasswordModal()">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>
        
        <div th:if="${passwordError != null}" class="bg-error-container text-on-error-container border border-error/20 p-4 rounded-xl mb-6 flex items-center gap-3">
            <span class="material-symbols-outlined">error</span>
            <span th:text="${passwordError}"></span>
        </div>

        <form id="passwordForm" th:action="@{/admin/profile/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="flex flex-col gap-4 mb-8">
                <div>
                    <label for="currentPassword" class="block text-body-sm font-bold text-on-surface mb-2">Mật khẩu hiện tại <span class="text-error">*</span></label>
                    <input type="password" id="currentPassword" name="currentPassword" placeholder="Nhập mật khẩu hiện tại" class="w-full bg-surface-container border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none transition-colors" required />
                </div>
                <div>
                    <label for="newPassword" class="block text-body-sm font-bold text-on-surface mb-2">Mật khẩu mới <span class="text-error">*</span></label>
                    <input type="password" id="newPassword" name="newPassword" placeholder="Nhập mật khẩu mới" class="w-full bg-surface-container border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none transition-colors" required />
                    <div class="text-on-surface-variant/70 text-[12px] mt-2">Mật khẩu phải có ít nhất 8 ký tự</div>
                </div>
                <div>
                    <label for="confirmPassword" class="block text-body-sm font-bold text-on-surface mb-2">Xác nhận mật khẩu <span class="text-error">*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu mới" class="w-full bg-surface-container border border-outline rounded-xl p-3 text-body-md focus:border-primary outline-none transition-colors" required />
                </div>
            </div>

            <div class="flex items-center gap-3 justify-end">
                <button type="button" class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container hover:bg-surface-container-high text-on-surface font-bold text-body-sm transition-colors cursor-pointer" onclick="window.closePasswordModal()">Hủy</button>
                <button type="submit" class="px-5 py-2.5 rounded-full bg-[#22c55e] hover:opacity-90 text-white font-bold text-body-sm transition-opacity border-none cursor-pointer flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">key</span> Xác nhận đổi mật khẩu
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast" style="display:none;">
    <span id="toastMessage"></span>
    <button id="toastClose">&times;</button>
</div>

<!-- Server Message -->
<div id="serverMessage"
     th:if="${message != null}"
     th:data-message="${message}"
     th:data-type="${messageType != null ? messageType : 'info'}"
     style="display:none;"></div>

<!-- Hidden flag để JS biết mở modal -->
<div id="openModalFlag" th:if="${openPasswordModal != null and openPasswordModal}"
     data-open="true" style="display:none;"></div>

<script src="/js/admin/admin-profile.js"></script>
</body>
</html>
