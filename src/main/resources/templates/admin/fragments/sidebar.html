<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body>
<!-- Sidebar Fragment -->
<aside th:fragment="sidebar(currentPage)" class="w-72 shrink-0 bg-surface-container-lowest border-r border-outline-variant flex flex-col h-screen sticky top-0 overflow-y-auto">
    <!-- Logo - Click to Dashboard -->
    <a th:href="@{/admin/dashboard}" class="p-6 flex items-center gap-3 no-underline hover:bg-surface-container/50 transition-colors rounded-xl m-2">
        <span class="material-symbols-outlined text-primary text-[32px]">coffee</span>
        <div>
            <span class="font-headline-md text-primary font-bold m-0 tracking-tight block" th:text="${siteName != null ? siteName : 'BrewMaster'}">BrewMaster</span>
            <span class="text-[10px] text-on-surface-variant/60 font-medium block">Admin Panel</span>
        </div>
    </a>

    <!-- Navigation -->
    <nav class="flex-1 px-4 pb-6 flex flex-col gap-6">
        <!-- Main Section -->
        <div class="flex flex-col gap-2">
            <div class="text-[11px] font-bold text-on-surface-variant/60 uppercase tracking-widest px-4 mb-1">Chính</div>
            <a th:href="@{/admin/dashboard}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors no-underline"
               th:classappend="${currentPage == 'dashboard'} ? 'bg-primary/10 text-primary' : 'text-on-surface-variant hover:bg-surface-container hover:text-primary'">
                <span class="material-symbols-outlined text-[20px]">dashboard</span>
                Tổng quan
            </a>
            <a th:href="@{/admin/accounts}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors no-underline"
               th:classappend="${currentPage == 'accounts'} ? 'bg-primary/10 text-primary' : 'text-on-surface-variant hover:bg-surface-container hover:text-primary'">
                <span class="material-symbols-outlined text-[20px]">group</span>
                Người dùng
            </a>
        </div>

        <!-- System Section -->
        <div class="flex flex-col gap-2">
            <div class="text-[11px] font-bold text-on-surface-variant/60 uppercase tracking-widest px-4 mb-1 border-t border-outline-variant pt-6">Hệ thống</div>
            <a th:href="@{/admin/system-logs}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors no-underline"
               th:classappend="${currentPage == 'system-logs'} ? 'bg-primary/10 text-primary' : 'text-on-surface-variant hover:bg-surface-container hover:text-primary'">
                <span class="material-symbols-outlined text-[20px]">history</span>
                Nhật ký hệ thống
            </a>
            <a th:href="@{/admin/config}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors no-underline"
               th:classappend="${currentPage == 'config'} ? 'bg-primary/10 text-primary font-semibold' : 'text-on-surface-variant hover:bg-surface-container hover:text-primary'">
                <span class="material-symbols-outlined text-[20px]">settings</span>
                <span>Cấu hình hệ thống</span>
            </a>
        </div>

        <!-- Footer - Account & Info -->
        <div class="mt-auto flex flex-col gap-2 pt-6 border-t border-outline-variant">

            <!-- Account Actions -->
            <div class="text-[11px] font-bold text-on-surface-variant/60 uppercase tracking-widest px-4 mb-1">Tài khoản</div>
            <a th:href="@{/admin/profile}"
               class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-colors no-underline"
               th:classappend="${currentPage == 'profile'} ? 'bg-primary/10 text-primary' : 'text-on-surface-variant hover:bg-surface-container hover:text-primary'">
                <span class="material-symbols-outlined text-[20px]">account_circle</span>
                Hồ sơ
            </a>
            <!-- Nút đăng xuất -->
            <button type="button" id="logoutBtn"
                    class="w-full text-left flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-error hover:bg-error/10 transition-colors border-none cursor-pointer bg-transparent">
                <span class="material-symbols-outlined text-[20px]">logout</span>
                Đăng xuất
            </button>

            <!-- Version Info -->
            <div class="text-[10px] text-on-surface-variant/40 text-center px-4 mt-2">
                <span>BrewMaster v2.0.0</span>
                <span class="mx-1">•</span>
                <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}">2024</span>
            </div>
        </div>
    </nav>
</aside>
</body>
</html>
