<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrewMaster - Sign In</title>
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
    <script src="https://unpkg.com/feather-icons"></script>
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body>

<div class="auth-layout">
  <!-- Glassmorphic Card -->
  <div class="auth-right-pane">
    <div class="auth-form-container">
      
      <div class="auth-header">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Please enter your details to sign in</p>
      </div>

      <!-- Messages -->
      <div th:if="${param.successMessage}" class="auth-alert-success">
          <i data-feather="check-circle" class="auth-icon-small"></i>
          <span th:text="${param.successMessage}"></span>
      </div>
      <div th:if="${param.errorMessage}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${param.errorMessage}"></span>
      </div>
      <div th:if="${error}" class="auth-alert-error">
          <i data-feather="alert-circle" class="auth-icon-small"></i>
          <span th:text="${error}"></span>
      </div>



      <form th:action="@{/login}" method="post" class="auth-form">
        <!-- Username Field -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="user" class="auth-icon"></i>
          </div>
          <input
            id="username" name="username" type="text" required
            class="auth-input"
            placeholder="Username"
          />
        </div>

        <!-- Password Field -->
        <div class="auth-input-group">
          <div class="auth-input-icon-left">
            <i data-feather="lock" class="auth-icon"></i>
          </div>
          <input
            id="password" name="password" type="password" required
            class="auth-input-password"
            placeholder="Password"
          />
          <button type="button" onclick="togglePassword('password', 'eye-icon')" class="auth-input-icon-right">
            <i id="eye-icon" data-feather="eye" class="auth-icon"></i>
          </button>
        </div>

        <!-- Remember Me & Forgot Password -->
        <!-- Forgot Password -->
        <div class="auth-remember-row">
          <a href="/forgot-password" class="auth-link">
            Forgot password?
          </a>
        </div>

        <!-- Sign In Button -->
        <button type="submit" class="auth-btn-primary mt-4">
          Sign In
        </button>
        
        <!-- Google Button -->
        <div class="auth-divider">
            <span class="auth-divider-text">OR</span>
        </div>
        
        <a href="/oauth2/authorization/google" class="auth-btn-google">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google icon">
          Sign In with Google
        </a>
      </form>

      <!-- Footer Sign Up -->
      <p class="mt-8 text-center text-sm text-stone-600">
        Don't have an account? &nbsp;&nbsp;
        <a href="/register" class="auth-link font-semibold">
          Create one
        </a>
      </p>

    </div>
  </div>
</div>

<script>
  feather.replace();
  function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === "password") {
      input.type = "text";
      icon.setAttribute('data-feather', 'eye-off');
    } else {
      input.type = "password";
      icon.setAttribute('data-feather', 'eye');
    }
    feather.replace();
  }
</script>
</body>
</html>
