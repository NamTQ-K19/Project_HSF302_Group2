<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Xác nhận đặt bàn – BrewMaster</title>

    <div th:replace="~{catalog/tailwind-head :: tailwind-head}"></div>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body class="bg-background text-on-surface font-body-md antialiased">

<div th:replace="~{catalog/navbar :: navbar}"></div>

<main class="max-w-max-width mx-auto px-margin-desktop py-12 min-h-[70vh]">
    <div class="max-w-2xl mx-auto">
        <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl overflow-hidden shadow-sm">
            <div class="px-8 py-5 border-b border-outline-variant bg-surface-container-low/50 flex items-center gap-3">
                <span class="material-symbols-outlined text-[#22c55e] text-[28px]">check_circle</span>
                <h2 class="font-headline-sm text-primary m-0">Đặt bàn thành công!</h2>
            </div>
            <div class="p-8 text-center">
                <div class="w-24 h-24 rounded-full bg-[#22c55e]/10 flex items-center justify-center mx-auto mb-6">
                    <span class="material-symbols-outlined text-[#22c55e] text-5xl">check_circle</span>
                </div>
                <p class="text-on-surface-variant text-body-lg mb-6">Cảm ơn bạn đã đặt bàn tại BrewMaster. Chúng tôi rất mong được phục vụ bạn!</p>

                <div class="bg-surface-container-low rounded-xl p-6 border border-outline-variant text-left max-w-lg mx-auto mb-6">
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <span class="text-on-surface-variant">Mã đặt bàn:</span>
                        <span class="font-bold text-primary" th:text="'#' + ${reservation.reservationId}"></span>

                        <span class="text-on-surface-variant">Ngày giờ:</span>
                        <span th:text="${#temporals.format(reservation.reservationDate, 'dd/MM/yyyy')} + ' - ' + ${#temporals.format(reservation.reservationTime, 'HH:mm')}"></span>

                        <span class="text-on-surface-variant">Số khách:</span>
                        <span th:text="${reservation.partySize} + ' khách'"></span>

                        <span class="text-on-surface-variant">Bàn:</span>
                        <span th:text="${reservation.tableIds != null and not #lists.isEmpty(reservation.tableIds) ? #strings.listJoin(reservation.tableIds, ', ') : 'Chưa cập nhật'}"></span>

                        <span class="text-on-surface-variant">Trạng thái:</span>
                        <span class="inline-flex items-center gap-1">
                            <span class="w-2 h-2 rounded-full bg-[#22c55e]"></span>
                            <span class="text-[#22c55e] font-bold" th:text="${reservation.statusDisplay}"></span>
                        </span>

                        <span class="text-on-surface-variant">Đã thanh toán:</span>
                        <span class="font-bold text-primary" th:text="${#numbers.formatDecimal(depositAmount != null ? depositAmount : 50000, 0, 'COMMA', 0, 'POINT') + 'đ'}">50.000đ</span>
                    </div>

                    <div th:if="${reservation.note != null and !reservation.note.isEmpty()}" class="mt-3 pt-3 border-t border-outline-variant">
                        <span class="text-on-surface-variant text-sm">Ghi chú:</span>
                        <p class="text-sm text-on-surface mt-1" th:text="${reservation.note}"></p>
                    </div>
                </div>

                <div class="flex flex-wrap gap-4 justify-center">
                    <a th:href="@{/customer/reservations}" class="bg-primary hover:opacity-90 text-white px-6 py-3 rounded-xl font-bold text-body-sm transition-opacity no-underline flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">list</span>
                        Xem danh sách đặt bàn
                    </a>
                    <a th:href="@{/}" class="bg-surface-container-high hover:bg-surface-container text-on-surface px-6 py-3 rounded-xl font-bold text-body-sm transition-colors border border-outline no-underline flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">home</span>
                        Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{catalog/footer :: footer}"></div>

</body>
</html>
