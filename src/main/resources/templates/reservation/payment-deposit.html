<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Thanh toán tiền cọc – BrewMaster</title>
  <div th:replace="~{catalog/tailwind-head :: tailwind-head}"></div>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <meta name="_csrf" th:content="${_csrf?.token}" />
  <meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>
<body class="bg-background text-on-surface font-body-md antialiased">

<div th:replace="~{catalog/navbar :: navbar}"></div>

<main class="max-w-max-width mx-auto px-margin-desktop py-12 min-h-[70vh]">
  <div class="max-w-2xl mx-auto">
    <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl overflow-hidden shadow-sm">
      <div class="px-8 py-5 border-b border-outline-variant bg-surface-container-low/50 flex items-center gap-3">
        <span class="material-symbols-outlined text-primary text-[28px]">payment</span>
        <h2 class="font-headline-sm text-primary m-0">Thanh toán tiền cọc</h2>
      </div>
      <div class="p-8">
        <div th:if="${errorMessage}" class="bg-error/10 text-error p-4 rounded-xl mb-4 border border-error/20">
          <span th:text="${errorMessage}"></span>
        </div>
        <div class="bg-surface-container-low rounded-xl p-6 mb-6 border border-outline-variant">
          <h3 class="text-sm font-bold text-on-surface mb-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">receipt_long</span> Thông tin đặt bàn
          </h3>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <span class="text-on-surface-variant">Mã đặt bàn:</span>
            <span class="font-bold text-primary" th:text="'#' + ${reservation.reservationId}"></span>
            <span class="text-on-surface-variant">Ngày:</span>
            <span th:text="${#temporals.format(reservation.reservationDate, 'dd/MM/yyyy')} + ' - ' + ${#temporals.format(reservation.reservationTime, 'HH:mm')}"></span>
            <span class="text-on-surface-variant">Số khách:</span>
            <span th:text="${reservation.partySize} + ' khách'"></span>
            <span class="text-on-surface-variant">Bàn:</span>
            <span th:text="${reservation.tableIds != null and not #lists.isEmpty(reservation.tableIds) ? #strings.listJoin(reservation.tableIds, ', ') : 'Đang chọn'}"></span>
          </div>
          <div th:if="${reservation.note != null and !reservation.note.isEmpty()}" class="mt-3 pt-3 border-t border-outline-variant">
            <span class="text-on-surface-variant text-sm">Ghi chú:</span>
            <p class="text-sm text-on-surface mt-1" th:text="${reservation.note}"></p>
          </div>
        </div>
        <div class="bg-primary/5 rounded-xl p-6 border border-primary/20 text-center mb-6">
          <p class="text-sm text-on-surface-variant mb-1">Số tiền cọc cần thanh toán</p>
          <p class="text-4xl font-bold text-primary">
            <span th:text="${#numbers.formatDecimal(depositAmount != null ? depositAmount : 50000, 0, 'COMMA', 0, 'POINT') + 'đ'}">50.000đ</span>
          </p>
          <div class="flex items-center justify-center gap-2 mt-3 text-xs text-on-surface-variant bg-primary/10 rounded-full px-4 py-2 inline-block">
            <span class="material-symbols-outlined text-[16px]">info</span> Tiền cọc được hoàn trả khi bạn đến đúng giờ hoặc trừ vào hóa đơn
          </div>
        </div>
        <form th:action="@{'/customer/reservations/' + ${reservation.reservationId} + '/deposit'}" method="post">
          <div class="mb-6">
            <label class="block text-sm font-bold text-on-surface mb-3">Chọn phương thức thanh toán</label>
            <div class="grid grid-cols-2 gap-3">
              <!-- ⭐ SỬA: method.paymentMethodId thay vì method.key -->
              <div th:each="method : ${paymentMethods}"
                   class="flex items-center gap-3 p-3 border border-outline rounded-xl hover:border-primary transition-all cursor-pointer payment-option"
                   onclick="selectPaymentMethod(this, ${method.paymentMethodId})">
                <input type="radio" name="paymentMethodId" th:value="${method.paymentMethodId}"
                       class="w-4 h-4 text-primary focus:ring-primary" required />
                <span th:text="${method.name}" class="text-sm font-medium"></span>
              </div>
            </div>
            <p id="paymentError" class="text-error text-sm mt-2 hidden">Vui lòng chọn phương thức thanh toán</p>
          </div>
          <input type="hidden" name="transactionRef" th:value="'DEP-' + ${reservation.reservationId} + '-' + ${#dates.format(#dates.createNow(), 'yyyyMMddHHmmss')}" />
          <div class="flex gap-4">
            <button type="submit" id="payBtn" class="flex-1 bg-primary hover:opacity-90 text-white px-6 py-3 rounded-xl font-bold text-body-sm transition-opacity border-none cursor-pointer shadow-sm flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-[18px]">check</span> Thanh toán
            </button>
            <a th:href="@{/customer/reservations}" class="flex-1 bg-surface-container-high hover:bg-surface-container text-on-surface px-6 py-3 rounded-xl font-bold text-body-sm transition-colors border border-outline text-center no-underline">Quay lại</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{catalog/footer :: footer}"></div>

<script>
  let selectedMethod = null;
  function selectPaymentMethod(element, methodId) {
    const container = element.closest('.grid');
    container.querySelectorAll('.payment-option').forEach(el => {
      el.classList.remove('border-primary', 'bg-primary/5');
    });
    element.classList.add('border-primary', 'bg-primary/5');
    const radio = element.querySelector('input[type="radio"]');
    if (radio) { radio.checked = true; selectedMethod = methodId; }
    document.getElementById('paymentError').classList.add('hidden');
  }
  document.querySelector('form').addEventListener('submit', function(e) {
    const checked = this.querySelector('input[name="paymentMethodId"]:checked');
    if (!checked) {
      e.preventDefault();
      document.getElementById('paymentError').classList.remove('hidden');
    }
  });
</script>
</body>
</html>
