<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- ============================================================
     Fragment: toast
     Used to render a global notification container and capture Flash messages.
     ============================================================ -->
<th:block th:fragment="toast">
    
    <!-- Hidden container to pass flash attributes to JavaScript -->
    <div id="spring-flash-messages" class="hidden"
         th:attr="data-success=${successMessage}, data-error=${errorMessage}">
    </div>

    <!-- Fixed container for Toasts -->
    <div id="global-toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Global Confirmation Modal -->
    <div id="global-confirm-modal" class="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-surface-container-lowest border border-outline-variant rounded-3xl p-6 max-w-md w-full shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 rounded-full bg-[#f59e0b]/10 flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined text-[#f59e0b]">help</span>
                </div>
                <h3 id="global-confirm-title" class="font-headline-sm text-primary m-0 text-lg font-bold">Xác nhận</h3>
            </div>
            <p id="global-confirm-message" class="text-body-md text-on-surface-variant mb-6 m-0 leading-relaxed">Bạn có chắc chắn muốn thực hiện hành động này?</p>
            <div class="flex justify-end gap-3">
                <button id="global-confirm-cancel" class="px-5 py-2.5 rounded-xl border border-outline text-on-surface-variant hover:bg-surface-container font-medium transition-colors cursor-pointer bg-transparent">Hủy bỏ</button>
                <button id="global-confirm-ok" class="px-5 py-2.5 rounded-xl bg-primary text-on-primary hover:opacity-90 font-medium shadow-md transition-all cursor-pointer border-none">Đồng ý</button>
            </div>
        </div>
    </div>

    <!-- Toast Logic Script -->
    <script th:src="@{/js/common/toast.js}"></script>
    
</th:block>
</html>
