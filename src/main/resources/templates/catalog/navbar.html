<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ============================================================
     Fragment: navbar
     Used by: all catalog pages
     ============================================================ -->
<header th:fragment="navbar" class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-outline-variant">
    <div class="flex justify-between items-center w-full px-margin-desktop py-5 max-w-max-width mx-auto">

        <!-- Logo / Home Link -->
        <div class="flex items-center gap-12">
            <a th:href="@{/}" class="flex items-center gap-2.5 no-underline">
                <!-- Logo -->
                <img th:if="${siteLogo}" th:src="@{${siteLogo}}"
                     alt="Logo" class="h-10 w-auto" />
                <span th:unless="${siteLogo}" class="material-symbols-outlined text-primary text-3xl"
                      style="font-variation-settings: 'wght' 500;">coffee</span>
                <h1 class="font-headline-md text-headline-md tracking-tight text-primary m-0"
                    th:text="${siteName}">BrewMaster</h1>
            </a>

            <!-- Search Bar -->
            <form th:action="@{/search}" method="get" class="hidden md:flex items-center bg-surface-container-low border border-outline-variant rounded-full px-5 py-2.5 w-96 m-0">
                <button type="submit" class="bg-transparent border-none p-0 flex items-center justify-center cursor-pointer">
                    <span class="material-symbols-outlined text-on-surface-variant/50 text-xl mr-3">search</span>
                </button>
                <input name="keyword" th:value="${keyword}" class="bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/40 font-body-sm w-full p-0 outline-none" placeholder="Tìm kiếm đồ uống..." type="text"/>
            </form>
        </div>

        <!-- Navigation -->
        <nav class="flex items-center gap-10">
            <!-- Desktop Links -->
            <div class="hidden lg:flex items-center gap-10">
                <a th:href="@{/search}" class="text-primary font-bold text-body-sm transition-opacity hover:opacity-70 no-underline">Menu</a>
                <a th:href="@{/loyalty-policy}" class="text-on-surface-variant font-medium text-body-sm transition-opacity hover:opacity-100 hover:text-primary no-underline">Offers</a>
                <a th:href="@{/customer/cart}" class="text-on-surface-variant font-medium text-body-sm transition-opacity hover:opacity-100 hover:text-primary no-underline">Cart</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-5">
                <!-- Cart Button -->
                <a th:href="@{/customer/cart}" class="relative hover:opacity-70 transition-opacity flex items-center justify-center text-on-surface no-underline">
                    <span class="material-symbols-outlined text-2xl" data-icon="shopping_cart">shopping_cart</span>
                    <span class="absolute -top-1.5 -right-1.5 bg-primary text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center" id="cartBadge" style="display:none;"><span id="cartCount">0</span></span>
                </a>

                <!-- Guest Actions -->
                <div sec:authorize="isAnonymous()" class="flex gap-4">
                    <a th:href="@{/auth/login}" class="text-on-surface-variant font-medium text-body-sm hover:text-primary transition-colors no-underline px-4 py-2">Đăng nhập</a>
                    <a th:href="@{/register}" class="bg-primary text-white font-medium text-body-sm hover:opacity-90 transition-opacity no-underline px-6 py-2 rounded-full">Đăng ký</a>
                </div>

                <!-- Logged In User Dropdown -->
                <div sec:authorize="isAuthenticated()" class="relative group" tabindex="0">
                    <div class="flex items-center gap-2 cursor-pointer hover:opacity-70 transition-opacity">
                        <div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center">
                            <span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="account_circle">person</span>
                        </div>
                        <span sec:authentication="name" class="hidden sm:block text-on-surface font-semibold text-body-sm truncate max-w-[100px]">User</span>
                        <span class="material-symbols-outlined text-on-surface-variant text-sm">expand_more</span>
                    </div>

                    <!-- Dropdown Menu -->
                    <div class="absolute right-0 top-full mt-2 w-56 bg-white rounded-xl border border-outline-variant shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                        <div class="p-2 flex flex-col gap-1">
                            <a th:href="@{/customer/profile}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-surface-container-low text-on-surface-variant hover:text-primary transition-colors no-underline text-body-sm font-medium">
                                <span class="material-symbols-outlined text-[20px]">account_circle</span> Thông tin tài khoản
                            </a>
                            <a th:href="@{/customer/points}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-surface-container-low text-on-surface-variant hover:text-primary transition-colors no-underline text-body-sm font-medium">
                                <span class="material-symbols-outlined text-[20px]">stars</span> Lịch sử điểm
                            </a>
                            <a th:href="@{/customer/orders/history}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-surface-container-low text-on-surface-variant hover:text-primary transition-colors no-underline text-body-sm font-medium">
                                <span class="material-symbols-outlined text-[20px]">receipt_long</span> Lịch sử đơn hàng
                            </a>
                            <a th:href="@{/customer/reviews}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-surface-container-low text-on-surface-variant hover:text-primary transition-colors no-underline text-body-sm font-medium">
                                <span class="material-symbols-outlined text-[20px]">rate_review</span> Đánh giá
                            </a>
                            <a th:href="@{/customer/reservations}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-surface-container-low text-on-surface-variant hover:text-primary transition-colors no-underline text-body-sm font-medium border-b border-outline-variant">
                                <span class="material-symbols-outlined text-[20px]">calendar_month</span> Đặt bàn
                            </a>
                            <form th:action="@{/logout}" method="post" class="m-0 p-0">
                                <button type="submit" class="w-full text-left flex items-center gap-3 px-4 py-2.5 rounded-lg hover:bg-surface-container-low text-error transition-colors no-underline text-body-sm font-medium bg-transparent border-none cursor-pointer">
                                    <span class="material-symbols-outlined text-[20px]">logout</span> Đăng xuất
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </div>
</header>
</html>
