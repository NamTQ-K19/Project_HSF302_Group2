<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="tailwind-head">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#745853",
                        "on-secondary-container": "#6b6360",
                        "tertiary": "#24150f",
                        "surface-bright": "#ffffff",
                        "on-surface-variant": "#706d6c",
                        "on-surface": "#1a1c1c",
                        "primary-container": "#f8f1ef",
                        "primary": "#271310",
                        "inverse-on-surface": "#f1f1f0",
                        "on-primary-fixed": "#2b1613",
                        "background": "#ffffff",
                        "tertiary-fixed": "#fadcd2",
                        "primary-fixed": "#ffdad4",
                        "inverse-surface": "#2f3130",
                        "primary-fixed-dim": "#e3beb8",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#f9f9f8",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "on-error": "#ffffff",

                        "secondary": "#655d5a",
                        "on-tertiary-fixed-variant": "#56423b",
                        "outline-variant": "#efefef",
                        "inverse-primary": "#e3beb8",
                        "surface": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a"

                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "max-width": "1400px",
                        "base": "8px",
                        "gutter": "32px",
                        "margin-desktop": "32px"
                    },
                    "fontFamily": {
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-caps": ["11px", {"lineHeight": "1", "letterSpacing": "0.08em", "fontWeight": "700"}],

                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]

            },
        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .minimal-shadow {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script th:src="@{/js/common/toast.js}"></script>

    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

</html>
