<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - Barista</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/barista/style.css(v=3)}"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{barista/fragments/sidebar :: sidebar('profile')}"></th:block>

<div class="main-content">
    <div class="header">
        <div>
            <div class="page-title">Hồ Sơ Cá Nhân</div>
            <div class="page-subtitle">Quản lý thông tin tài khoản</div>
        </div>
    </div>

    <div class="content-body">
        <div class="profile-container">

            <div th:if="${message}"
                 th:class="${'alert ' + (messageType == 'success' ? 'alert-success' : 'alert-error')}"
                 th:text="${message}"></div>
            <div th:if="${passwordError}" class="alert alert-error" th:text="${passwordError}"></div>

            <div class="profile-card">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('info')">Thông tin cá nhân</button>
                    <button class="tab-btn" onclick="switchTab('password')"
                            th:classappend="${openPasswordModal == 'true' ? ' active' : ''}">Đổi mật khẩu</button>
                </div>

                <div class="tab-content">

                    <!-- Tab thông tin -->
                    <div id="tab-info" class="tab-pane active">
                        <form th:action="@{/barista/profile/update}" method="post">
                            <div class="form-group">
                                <label>Tên đăng nhập</label>
                                <input type="text" class="form-control" th:value="${user.username}" disabled/>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" class="form-control" th:value="${user.email}" disabled/>
                            </div>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Họ (First Name)</label>
                                    <input type="text" class="form-control" name="firstName" th:value="${user.firstName}" required/>
                                </div>
                                <div class="form-group">
                                    <label>Tên (Last Name)</label>
                                    <input type="text" class="form-control" name="lastName" th:value="${user.lastName}" required/>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Số điện thoại</label>
                                <input type="text" class="form-control" name="phone" th:value="${user.phone}"/>
                            </div>
                            <button type="submit" class="btn-primary">Lưu thay đổi</button>
                        </form>
                    </div>

                    <!-- Tab đổi mật khẩu -->
                    <div id="tab-password" class="tab-pane">
                        <form th:action="@{/barista/profile/password}" method="post">
                            <div class="form-group">
                                <label>Mật khẩu hiện tại</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" name="currentPassword" required/>
                                    <button type="button" class="toggle-password" onclick="togglePassword(this)">
                                        <span class="material-symbols-outlined" style="font-size:20px;">visibility</span>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Mật khẩu mới</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" name="newPassword" required minlength="6"/>
                                    <button type="button" class="toggle-password" onclick="togglePassword(this)">
                                        <span class="material-symbols-outlined" style="font-size:20px;">visibility</span>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Xác nhận mật khẩu mới</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" name="confirmPassword" required minlength="6"/>
                                    <button type="button" class="toggle-password" onclick="togglePassword(this)">
                                        <span class="material-symbols-outlined" style="font-size:20px;">visibility</span>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn-primary">Đổi mật khẩu</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(pane => { pane.classList.remove('active'); pane.style.display = 'none'; });
        if (tabName === 'info') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('tab-info').classList.add('active');
            document.getElementById('tab-info').style.display = 'block';
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('tab-password').classList.add('active');
            document.getElementById('tab-password').style.display = 'block';
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        if (document.getElementById('tab-password').classList.contains('active')) {
            switchTab('password');
        } else {
            switchTab('info');
        }
    });

    function togglePassword(button) {
        const input = button.closest('.password-wrapper').querySelector('input');
        const icon = button.querySelector('.material-symbols-outlined');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            input.type = 'password';
            icon.textContent = 'visibility';
        }
    }
</script>
</body>
</html>
