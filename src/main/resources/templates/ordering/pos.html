<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{ordering/cashier-layout :: head('Bán hàng tại quầy (POS)')}"></th:block>
    <link rel="stylesheet" th:href="@{/css/ordering/pos.css}">
</head>
<body class="bg-surface font-body-md text-on-surface antialiased flex h-screen overflow-hidden">

<!-- Sidebar -->
<th:block th:replace="~{ordering/cashier-layout :: sidebar('pos')}"></th:block>

<!-- Main Content Area -->
<div class="flex-1 flex flex-col h-screen overflow-hidden bg-surface-container-low">
    <!-- Header -->
    <th:block th:replace="~{ordering/cashier-layout :: header('Bán hàng tại quầy (POS)', ${cashierName})}"></th:block>

    <!-- POS Workspace -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden p-4 md:p-6 gap-6">
        <!-- Left Column: Menu & Catalog (70%) -->
        <section class="flex-1 flex flex-col bg-surface-container-lowest rounded-3xl border border-outline-variant/60 overflow-hidden minimal-shadow">
            <!-- Search & Filter Bar -->
            <div class="p-4 md:p-5 border-b border-outline-variant/40 flex flex-col sm:flex-row items-center justify-between gap-4 bg-surface-container-lowest/50">
                <!-- Search Input -->
                <div class="relative w-full sm:w-80">
                    <span class="material-symbols-outlined absolute left-3.5 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                    <input type="text" id="product-search" placeholder="Tìm tên món, mô tả..." 
                           class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-surface-container border border-outline-variant/60 text-sm font-medium text-on-surface placeholder:text-on-surface-variant/60 focus:bg-surface-container-lowest focus:border-primary focus:outline-none transition-all">
                </div>

                <!-- Category Tabs -->
                <div class="flex items-center gap-2 overflow-x-auto w-full sm:w-auto pb-1 sm:pb-0 hide-scrollbar" id="category-tabs-container">
                    <button data-category-id="" class="category-tab px-4 py-2.5 rounded-2xl bg-primary text-on-primary font-bold text-xs shadow-md transition-all whitespace-nowrap border-none cursor-pointer flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-[18px]">grid_view</span>
                        <span>Tất cả</span>
                    </button>
                    <button th:each="cat : ${categories}" th:data-category-id="${cat.categoryId}"
                            class="category-tab px-4 py-2.5 rounded-2xl bg-surface-container text-on-surface-variant hover:bg-surface-container-high font-semibold text-xs transition-all whitespace-nowrap border-none cursor-pointer flex items-center gap-1.5">
                        <span class="material-symbols-outlined text-[18px] category-tab-icon">local_cafe</span>
                        <span th:text="${cat.name}">Cà phê</span>
                    </button>
                </div>
            </div>

            <!-- Product Grid -->
            <div id="product-grid" class="flex-1 p-4 md:p-6 overflow-y-auto pos-scroll">
                <!-- Dynamic products loaded by JS -->
            </div>
        </section>

        <!-- Right Column: Cart & Checkout (30% - min 380px) -->
        <section class="w-full lg:w-96 xl:w-[420px] shrink-0 flex flex-col bg-surface-container-lowest rounded-3xl border border-outline-variant/60 overflow-hidden minimal-shadow">
            <!-- Cart Header & Customer Selector -->
            <div class="p-5 border-b border-outline-variant/40 bg-surface-container/30 flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-[24px]">shopping_cart_checkout</span>
                        <h2 class="font-bold text-on-surface text-base m-0">Giỏ hàng hiện tại</h2>
                    </div>
                    <span id="cart-item-count" class="px-2.5 py-1 rounded-full bg-primary/10 text-primary font-bold text-xs">0</span>
                </div>

                <!-- Table Selector Button -->
                <button onclick="openTableModal()" class="w-full py-2.5 px-3.5 rounded-xl bg-primary/5 hover:bg-primary/10 border border-primary/20 text-primary font-bold text-xs transition-all flex items-center justify-between cursor-pointer">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">table_restaurant</span>
                        <span>Vị trí: <strong id="selected-table-label" class="underline">Mang về (Takeaway)</strong></span>
                    </div>
                    <span class="material-symbols-outlined text-[18px]">edit</span>
                </button>

                <!-- Customer Search Container -->
                <div id="customer-search-container" class="relative">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[18px]">person_search</span>
                        <input type="text" id="customer-search" placeholder="Tìm sđt, tên khách thành viên..." 
                               class="w-full pl-9 pr-3 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/60 text-xs font-medium text-on-surface focus:border-primary focus:outline-none">
                    </div>
                    <!-- Customer Dropdown -->
                    <div id="customer-dropdown" class="hidden absolute top-full left-0 right-0 mt-1 bg-surface-container-lowest rounded-xl border border-outline-variant shadow-xl z-20 max-h-48 overflow-y-auto"></div>
                </div>

                <!-- Selected Customer Badge -->
                <div id="selected-customer-badge" class="hidden"></div>
            </div>

            <!-- Cart Items List -->
            <div id="cart-items-container" class="flex-1 p-4 overflow-y-auto pos-scroll flex flex-col">
                <!-- Dynamic cart items -->
            </div>

            <!-- Cart Footer / Summary & Checkout -->
            <div class="p-5 border-t border-outline-variant/60 bg-surface-container/30 flex flex-col gap-4">
                <!-- Order Note -->
                <div>
                    <input type="text" id="order-note" placeholder="Ghi chú tổng đơn (mang về, giao sau...)" 
                           class="w-full px-3.5 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/60 text-xs text-on-surface focus:border-primary focus:outline-none">
                </div>

                <!-- Payment Method & Status -->
                <div class="grid grid-cols-2 gap-2.5">
                    <div>
                        <label class="block text-[10px] font-bold text-on-surface-variant uppercase mb-1">Phương thức</label>
                        <select id="payment-method-select" class="w-full px-3 py-2 rounded-xl bg-surface-container-lowest border border-outline-variant/60 text-xs font-semibold text-on-surface focus:border-primary focus:outline-none">
                            <option th:each="pm : ${paymentMethods}" th:value="${pm.paymentMethodId}" th:text="${pm.name}">Tiền mặt (Cash)</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <label class="w-full flex items-center gap-2 px-3 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-900 cursor-pointer font-semibold text-xs select-none">
                            <input type="checkbox" id="is-paid-checkbox" checked class="rounded text-emerald-600 focus:ring-emerald-500 w-4 h-4">
                            <span>Đã nhận đủ tiền</span>
                        </label>
                    </div>
                </div>

                <!-- Loyalty Points Discount Area -->
                <div id="loyalty-points-area" class="hidden p-3 rounded-xl bg-amber-50 border border-amber-200 text-amber-900 text-xs">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-bold flex items-center gap-1">
                            <span class="material-symbols-outlined text-[16px] text-amber-600">stars</span>
                            Điểm tích lũy: <b id="customer-points-val">0</b> điểm
                        </span>
                        <span id="customer-points-money" class="text-amber-700 font-semibold">(~0 ₫)</span>
                    </div>
                    <label class="flex items-center gap-2 cursor-pointer font-semibold select-none border-t border-amber-200/60 pt-2">
                        <input type="checkbox" id="use-points-checkbox" onchange="renderCart()" class="rounded text-amber-600 focus:ring-amber-500 w-4 h-4">
                        <span>Đổi điểm giảm giá (tối đa 50% đơn)</span>
                    </label>
                    <div id="points-discount-display" class="hidden flex justify-between items-center mt-1.5 text-emerald-700 font-bold">
                        <span>Giảm giá từ điểm:</span>
                        <span id="discount-money-val">-0 ₫</span>
                    </div>
                </div>

                <!-- Subtotal / Total -->
                <div class="space-y-1 pt-2 border-t border-outline-variant/40">
                    <div id="subtotal-row" class="hidden flex items-center justify-between text-xs text-on-surface-variant">
                        <span>Tạm tính:</span>
                        <span id="cart-subtotal">0 ₫</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-bold text-on-surface-variant">Tổng thanh toán:</span>
                        <span id="cart-total" class="font-headline-md text-primary font-bold text-xl">0 ₫</span>
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="btn-checkout" onclick="submitOrder()" disabled
                        class="w-full py-3.5 rounded-xl bg-primary text-on-primary font-bold text-sm shadow-xl shadow-primary/25 hover:bg-primary/90 active:scale-[0.99] transition-all disabled:opacity-50 disabled:cursor-not-allowed border-none cursor-pointer flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">check_circle</span>
                    Thanh toán & Đặt đơn
                </button>
            </div>
        </section>
    </main>
</div>

<!-- Variant Selection Modal -->
<div id="variant-modal" class="hidden fixed inset-0 bg-on-surface/50 backdrop-blur-sm z-50 items-center justify-center p-4">
    <div id="variant-modal-content" class="bg-surface-container-lowest rounded-3xl border border-outline-variant shadow-2xl max-w-lg w-full overflow-hidden animate-modal"></div>
</div>

<!-- Table Selection Modal -->
<div id="table-modal" class="hidden fixed inset-0 bg-on-surface/50 backdrop-blur-sm z-50 items-center justify-center p-4">
    <div class="bg-surface-container-lowest rounded-3xl border border-outline-variant shadow-2xl max-w-2xl w-full overflow-hidden animate-modal flex flex-col max-h-[85vh]">
        <div class="p-6 border-b border-outline-variant/40 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-[24px]">table_restaurant</span>
                <h3 class="text-lg font-bold text-on-surface m-0">Chọn vị trí / Bàn phục vụ</h3>
            </div>
            <button onclick="closeTableModal()" class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant hover:text-on-surface border-none cursor-pointer">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>
        <div id="tables-grid" class="p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 overflow-y-auto pos-scroll"></div>
    </div>
</div>

<script th:src="@{/js/ordering/pos.js}"></script>
</body>
</html>
