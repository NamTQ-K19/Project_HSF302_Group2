<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{ordering/cashier-layout :: head('Chi tiết đơn hàng #ORD-' + ${order.orderId})}"></th:block>
    <link rel="stylesheet" th:href="@{/css/ordering/list.css}">
</head>
<body class="bg-surface font-body-md text-on-surface antialiased flex h-screen overflow-hidden">

<!-- Sidebar -->
<th:block th:replace="~{ordering/cashier-layout :: sidebar('list')}"></th:block>

<!-- Main Content Area -->
<div class="flex-1 flex flex-col h-screen overflow-hidden bg-surface-container-low">
    <!-- Header -->
    <th:block th:replace="~{ordering/cashier-layout :: header('Chi tiết đơn hàng #ORD-' + ${order.orderId}, 'Thu ngân')}"></th:block>

    <!-- Content Workspace -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-4xl mx-auto bg-surface-container-lowest rounded-3xl border border-outline-variant/60 minimal-shadow overflow-hidden">
            <div class="p-6 border-b border-outline-variant/40 flex items-center justify-between bg-surface-container/30">
                <div>
                    <div class="flex items-center gap-3">
                        <span class="font-headline-md font-bold text-primary text-2xl" th:text="'Đơn hàng #ORD-' + ${order.orderId}">#ORD-101</span>
                        <span th:class="'status-badge status-' + ${order.orderStatus}" th:text="${order.orderStatus}">CONFIRMED</span>
                        <span th:class="'status-badge payment-' + ${order.paymentStatus}" th:text="${order.paymentStatus}">SUCCESS</span>
                    </div>
                    <div class="text-xs text-on-surface-variant mt-1.5" th:text="'Ngày đặt: ' + ${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')} + ' • Kênh: ' + ${order.orderType} + (${order.tableId != null ? ' • Bàn số ' + order.tableId : ''})">07/07/2026</div>
                </div>
                <a th:href="@{/order/list}" class="px-4 py-2 rounded-xl bg-surface-container hover:bg-surface-container-high text-on-surface font-semibold text-xs transition-colors no-underline flex items-center gap-1.5 border border-outline-variant">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Quay lại
                </a>
            </div>

            <div class="p-6 md:p-8 space-y-6">
                <!-- Customer Info -->
                <div class="p-5 rounded-2xl bg-surface-container/30 border border-outline-variant/60 flex flex-col sm:flex-row justify-between gap-4">
                    <div>
                        <div class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Khách hàng / Người đặt</div>
                        <div class="font-bold text-on-surface text-base" th:text="${order.customerName}">Nguyễn Văn A</div>
                        <div class="text-xs text-on-surface-variant mt-0.5" th:text="${order.customerPhone}">0901234567</div>
                        <div class="text-xs text-on-surface-variant" th:text="${order.customerEmail}">a@example.com</div>
                    </div>
                    <div class="sm:text-right">
                        <div class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-1">Thông tin thanh toán</div>
                        <div class="font-bold text-on-surface text-base" th:text="${order.paymentMethodName}">Tiền mặt (Cash)</div>
                        <div class="text-xs text-on-surface-variant mt-0.5" th:text="'Trạng thái: ' + ${order.paymentStatus}">SUCCESS</div>
                        <div class="text-xs text-on-surface-variant" th:if="${order.transactionRef != null and !order.transactionRef.isEmpty()}" th:text="'Mã GD: ' + ${order.transactionRef}">TX-101</div>
                    </div>
                </div>

                <!-- Items -->
                <div>
                    <h4 class="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-3">Danh sách sản phẩm</h4>
                    <div class="space-y-3">
                        <div th:each="i : ${order.items}" class="p-4 rounded-xl bg-surface-container-lowest border border-outline-variant/60 flex items-center justify-between">
                            <div>
                                <span class="font-bold text-base text-on-surface" th:text="${i.productName}">Cà phê sữa đá</span>
                                <span class="text-sm font-semibold text-primary ml-2" th:text="'(' + ${i.variantName} + ')'">(Size M, Lạnh)</span>
                                <div th:if="${i.specialNote != null and !i.specialNote.isEmpty()}" class="text-xs text-on-surface-variant italic mt-1 bg-surface-container px-2.5 py-1 rounded inline-block" th:text="'Ghi chú: ' + ${i.specialNote}">"Ít ngọt"</div>
                            </div>
                            <div class="text-right">
                                <span class="text-xs text-on-surface-variant" th:text="${#numbers.formatDecimal(i.price, 0, 'COMMA', 0, 'POINT')} + ' ₫ x ' + ${i.quantity}">30.000 ₫ x 2</span>
                                <div class="font-bold text-base text-on-surface mt-0.5" th:text="${#numbers.formatDecimal(i.itemTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">60.000 ₫</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Summary -->
                <div class="p-5 rounded-2xl bg-primary/5 border border-primary/20 flex items-center justify-between">
                    <span class="font-bold text-on-surface text-lg">Tổng tiền thanh toán:</span>
                    <span class="font-headline-md text-primary font-bold text-2xl" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">60.000 ₫</span>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/ordering/list.js}"></script>
</body>
</html>
